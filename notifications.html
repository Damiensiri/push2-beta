<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Alertes</title>
<meta name="theme-color" content="#287fbd">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<script src="assets/js/app-config.js?v=20260710-175511"></script>
<script src="assets/js/app-layout.js?v=20260710-175511"></script>

<link rel="stylesheet" href="assets/css/app.css?v=20260710-175511">
<link rel="stylesheet" href="assets/css/themes/summer.css?v=20260710-175511">
<link rel="stylesheet" href="assets/css/themes/autumn.css?v=20260710-175511">
<link rel="stylesheet" href="assets/css/themes/christmas.css?v=20260710-175511">
<link rel="stylesheet" href="assets/css/themes/winter.css?v=20260710-175511">
<link rel="stylesheet" href="assets/css/themes/spring.css?v=20260710-175511">
<link rel="stylesheet" href="assets/css/pages/notifications.css?v=20260710-175511">
</head>

<body class="app-page notifications-page">

<div class="ambient-stage" aria-hidden="true"></div>

<div class="page" id="page">

<header class="sub-header plan-header">
<button class="back-btn" onclick="goHome()">
<img src="image/back.svg">
</button>
<h1 class="sub-title">ALERTES</h1>
</header>

<div id="loader"><div class="spinner"></div></div>

<div id="lastUpdate"></div>

<div id="actions">
<button id="markAllBtn" onclick="marquerToutLu()">
Tout marquer comme lu
</button>
</div>

<div id="notifications"></div>

</div>

<script>

/* Chargement des notifications. */

const API_URL="https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrRY09nECq5kqJEPaFCkMRnR4qbM-Z9y5KOMgVdlakJAA_L1FlwHMDN84Nstw8qXhqpt9QHGCeU6Sr6aLk3y7hSeA-1vr_eBBQYFwVL111h-CJZc8JxRQKvcu3XE7Gg-OXbXE8Vkp1PlAMHAkhJduQw6bxUswIvR7b1rA8txQ2Rtyl25eNxQWvtBet3bytcH6RpMKvJdyZcSioOtKa5sYL4uRI4FOoFrfUzX5P_pjpK-cAN8Bdf6otVcK4myQl66GohjWiPVOyCuofXOq8M4lQkmsxucwQ&lib=MfQh9XKIUpdlMRcOJ4l9JImAGFOlNCMp3";

const STORAGE_KEY="alerts_lues";

function getLues(){ return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); }
function setLues(arr){ localStorage.setItem(STORAGE_KEY,JSON.stringify(arr)); }

function marquerLu(id){
  const lues=getLues();
  if(!lues.includes(id)){ lues.push(id); setLues(lues); }
}

function marquerToutLu(){
  const ids=[];
  document.querySelectorAll(".card").forEach(c=>{ ids.push(c.dataset.id); });
  setLues(ids);
  loadNotifications();
}

function parseDateFR(str){
  if(!str) return null;
  if(str.includes("-")){
    const p=str.split("-");
    return new Date(p[0],p[1]-1,p[2],0,0,0);
  }
  if(str.includes("/")){
    const p=str.split("/");
    return new Date(p[2],p[1]-1,p[0],0,0,0);
  }
  return null;
}

async function loadNotifications(){
  try{
    const res=await fetch(API_URL);
    const data=await res.json();
    const container=document.getElementById("notifications");
    container.innerHTML="";
    document.getElementById("lastUpdate").innerText =
      "Dernière mise à jour : "+new Date().toLocaleString();
    const today=new Date();
    today.setHours(0,0,0,0);
    const lues=getLues();

    data
      .filter(n=>{
        if(n.epingle==="oui") return true;
        if(n.active!=="oui") return false;
        if(!n.expire){
          const d=parseDateFR(n.date);
          if(!d) return true;
          return d>=today;
        }
        const exp=parseDateFR(n.expire);
        if(!exp) return true;
        return exp>=today;
      })
      .sort((a,b)=>{
        if(a.epingle==="oui" && b.epingle!=="oui") return -1;
        if(a.epingle!=="oui" && b.epingle==="oui") return 1;
        return b.id-a.id;
      })
      .forEach(n=>{
        const card=document.createElement("div");
        card.className="card";
        card.dataset.id=n.id;
        if(lues.includes(n.id)){ card.classList.add("lu"); }
        card.innerHTML=`
          <div class="card-time">${n.heure||""}</div>
          <div class="card-category">${n.categorie||""}</div>
          <div class="card-title">${n.titre}</div>
          ${n.epingle==="oui" ? `<div class="pin">📌 ÉPINGLÉ</div>` : ``}
        `;
        card.onclick=()=>{
          marquerLu(n.id);
          try{
            sessionStorage.setItem("alert_detail_cache",JSON.stringify(n));
          }catch(e){}
          window.location.href="detail.html?id="+n.id;
        };
        container.appendChild(card);
      });

    if(container.children.length===0){
      container.innerHTML="<div style='text-align:center;color:#777;margin-top:40px;'>Aucune notification</div>";
    }

  }catch(e){
    console.log("Erreur :",e);
  }
  document.getElementById("loader").style.display="none";
}

function goHome(){ window.location.href="index.html"; }

loadNotifications();
setInterval(loadNotifications,60000);

document.addEventListener("visibilitychange",()=>{
  if(!document.hidden){ loadNotifications(); }
});
</script>

</body>
</html>
