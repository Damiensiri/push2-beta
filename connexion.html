<body class="app-page login-page">
<div class="ambient-stage" aria-hidden="true"></div>
<main class="login-shell">
  <section class="login-card">
    <img class="login-logo" src="image/logo.png" alt="Écurie Damien Siri">
    <div><p class="login-eyebrow">Espace clients</p><h1>Bienvenue</h1>
      <p class="login-intro">Connectez-vous avec le compte créé par l’écurie.</p></div>
    <form id="loginForm" class="login-form">
      <label>Adresse email<input id="loginEmail" type="email" inputmode="email" autocomplete="username" required></label>
      <label>Mot de passe<input id="loginPassword" type="password" autocomplete="current-password" required></label>
      <button id="loginSubmit" type="submit">Se connecter</button>
      <p id="loginStatus" class="login-status" role="status"></p>
    </form>
    <p class="login-help">Vous n’avez pas encore de compte ? Contactez l’écurie.</p>
  </section>
</main>
<script src="assets/js/connexion-beta.js?v=20260716-1"></script>
</body>
