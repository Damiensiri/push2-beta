<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#287fbd">
<link rel="manifest" href="manifest.json?v=20260716-2">
<link rel="apple-touch-icon" sizes="192x192" href="image/icon-192x192.png?v=20260714-181500">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ecurie DS">
<script>
if("serviceWorker" in navigator){
window.addEventListener("load",()=>{
const base=new URL("./",location.href);
navigator.serviceWorker.register(new URL("OneSignalSDKWorker.js",base).href,{scope:base.pathname})
.then(registration=>registration.update()).catch(()=>{});
});
}
</script>
<title>Connexion — Écurie Damien Siri</title>
<script src="assets/js/app-config.js?v=20260716-1"></script>
<script src="assets/js/app-layout.js?v=20260716-8"></script>
<link rel="stylesheet" href="assets/css/app.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/themes/summer.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/themes/autumn.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/themes/christmas.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/themes/winter.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/themes/spring.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/pages/connexion.css?v=20260716-2">
</head>
<body class="app-page login-page">
<div class="ambient-stage" aria-hidden="true"></div>
<main class="login-shell">
  <section class="login-card">
    <img class="login-logo" src="image/logo.png" alt="Écurie Damien Siri">
    <div><p class="login-eyebrow">Espace clients</p><h1>Bienvenue</h1>
      <p class="login-intro">Connectez-vous à votre espace personnel.</p></div>
    <div class="auth-tabs" role="tablist">
      <button id="showLogin" class="is-active" type="button">Connexion</button>
      <button id="showRegister" type="button">Créer mon compte</button>
    </div>
    <form id="loginForm" class="login-form">
      <label>Adresse email<input id="loginEmail" type="email" inputmode="email" autocomplete="username" required></label>
      <label>Mot de passe<input id="loginPassword" type="password" autocomplete="current-password" required></label>
      <button id="showForgot" class="auth-text-button" type="button">Mot de passe oublié ?</button>
      <button id="loginSubmit" type="submit">Se connecter</button>
      <p id="loginStatus" class="login-status" role="status"></p>
    </form>
    <form id="registerForm" class="login-form" hidden>
      <div class="register-names">
        <label>Prénom<input id="registerFirstName" maxlength="60" autocomplete="given-name" required></label>
        <label>Nom<input id="registerLastName" maxlength="80" autocomplete="family-name" required></label>
      </div>
      <label>Adresse email<input id="registerEmail" type="email" maxlength="160" inputmode="email" autocomplete="email" required></label>
      <label>Mot de passe<input id="registerPassword" type="password" minlength="12" maxlength="200" autocomplete="new-password" required></label>
      <label>Confirmer le mot de passe<input id="registerPasswordConfirm" type="password" minlength="12" maxlength="200" autocomplete="new-password" required></label>
      <p class="login-help">12 caractères minimum. Votre accès sera ouvert après validation par Damien.</p>
      <button id="registerSubmit" type="submit">Envoyer ma demande</button>
      <p id="registerStatus" class="login-status" role="status"></p>
    </form>
    <form id="forgotForm" class="login-form" hidden>
      <p class="login-help">Indiquez votre adresse email. Si le compte est actif, vous recevrez un lien valable 30 minutes.</p>
      <label>Adresse email<input id="forgotEmail" type="email" maxlength="160" inputmode="email" autocomplete="email" required></label>
      <button id="forgotSubmit" type="submit">Recevoir le lien</button>
      <button class="auth-text-button" data-back-login type="button">Retour à la connexion</button>
      <p id="forgotStatus" class="login-status" role="status"></p>
    </form>
    <form id="resetForm" class="login-form" hidden>
      <p class="login-help">Choisissez votre nouveau mot de passe.</p>
      <label>Nouveau mot de passe<input id="resetPassword" type="password" minlength="12" maxlength="200" autocomplete="new-password" required></label>
      <label>Confirmer le mot de passe<input id="resetPasswordConfirm" type="password" minlength="12" maxlength="200" autocomplete="new-password" required></label>
      <button id="resetSubmit" type="submit">Enregistrer le nouveau mot de passe</button>
      <p id="resetStatus" class="login-status" role="status"></p>
    </form>
  </section>
</main>
<script src="assets/js/connexion-beta.js?v=20260717-1"></script>
</body>
</html>
