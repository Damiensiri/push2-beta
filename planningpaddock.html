<script>

const PADDOCK_API="https://ecurie-notifications-beta.damiensiri-pro.workers.dev"
const PADDOCK_TOKEN_KEY="ecurie_beta_session"
let currentViewer=null

async function paddockApi(path,options={}){
const token=localStorage.getItem(PADDOCK_TOKEN_KEY)||""
const response=await fetch(PADDOCK_API+path,{
...options,
headers:{authorization:"Bearer "+token,...(options.body?{"content-type":"application/json"}:{})}
})
const data=await response.json().catch(()=>({}))
if(!response.ok)throw new Error(data.error||"Service paddock indisponible")
return data
}
function showSheet(title,text){

document.getElementById("sheetTitle").innerText = title
document.getElementById("sheetText").innerHTML = text
document.getElementById("confirmSheet").classList.add("show")

}

function closeSheet(){

document.getElementById("confirmSheet").classList.remove("show")

}

let reservations=[]
let horaires={}
let restrictions={}
let selectedDate=null
let selected=null
let reservationsLoaded=false
let horairesLoaded=false
let lastPlanningSignature=""

let adminMode=false

const title=document.getElementById("title")

let myReservations=JSON.parse(localStorage.getItem("myReservations")||"[]")

const durationSelect=document.getElementById("duration")
const paddockSelect=document.getElementById("paddock")
const confirmEmail=document.getElementById("confirmEmail")
const confirmationEmailOption=document.getElementById("confirmationEmailOption")
const miseEmailNotice=document.getElementById("miseEmailNotice")

function updateEmailRequirement(){
const mise=document.getElementById("type").value==="mise"
confirmEmail.checked=mise
confirmEmail.disabled=mise
confirmationEmailOption.hidden=false
confirmationEmailOption.lastChild.textContent=mise?" Confirmation par email obligatoire":" Recevoir une confirmation par email"
miseEmailNotice.hidden=!mise
miseEmailNotice.textContent=mise&&currentViewer?"Elle sera envoyée à "+currentViewer.email:""
}

function showStep(id){

const step=document.getElementById(id)

step.classList.add("visible")
step.classList.remove("locked")

}

function hideStep(id){

const step=document.getElementById(id)

step.classList.remove("visible")
step.classList.add("locked")

}

function resetProgress(){

hideStep("stepOptions")
hideStep("stepDay")
hideStep("stepPlanning")
hideStep("stepDetails")
hideStep("stepButton")

document.querySelectorAll(".row").forEach(r=>r.classList.remove("selected"))
document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"))
selectedDate=null
selected=null

}

function resetAfterOptionChange(){

selectedDate=null
selected=null
hideStep("stepDay")
hideStep("stepPlanning")
hideStep("stepDetails")
hideStep("stepButton")
document.querySelectorAll(".row").forEach(r=>r.classList.remove("selected"))
document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"))

}

function resetAfterPaddockChange(){

selected=null
hideStep("stepDetails")
hideStep("stepButton")
document.querySelectorAll(".row").forEach(r=>{
r.style.display="flex"
r.classList.remove("selected")
})

const changeBtn=document.getElementById("changeSlotBtn")

if(changeBtn){
changeBtn.remove()
}

if(!paddockSelect.value){

selectedDate=null
document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"))
document.getElementById("planning").innerHTML=""
hideStep("stepPlanning")
return

}

if(selectedDate){

showStep("stepPlanning")
generate()

}else{

hideStep("stepPlanning")

}

}

function showDayIfOptionsReady(){

const type=document.getElementById("type").value

if(type==="mise"){

showStep("stepDay")
return

}

if(type==="reservation" && durationSelect.value && paddockSelect.value){

showStep("stepDay")

}else{

hideStep("stepDay")

}

}

function restoreSlots(){

selected=null

document.querySelectorAll(".row").forEach(r=>{
r.style.display="flex"
r.classList.remove("selected")
})

const changeBtn=document.getElementById("changeSlotBtn")

if(changeBtn){
changeBtn.remove()
}

hideStep("stepDetails")
hideStep("stepButton")

}

function keepOnlySelectedSlot(row){

document.querySelectorAll(".row").forEach(r=>{
r.classList.remove("selected")
r.style.display="none"
})

row.style.display="flex"
row.classList.add("selected")

let changeBtn=document.getElementById("changeSlotBtn")

if(!changeBtn){

changeBtn=document.createElement("button")
changeBtn.id="changeSlotBtn"
changeBtn.className="changeSlotBtn"
changeBtn.type="button"
changeBtn.innerText="Changer"
changeBtn.onclick=restoreSlots
document.getElementById("planning").appendChild(changeBtn)

}

}

function initType(){

const typeSelect=document.getElementById("type")

typeSelect.addEventListener("change",()=>{

const mise=typeSelect.value==="mise"
const reservation=typeSelect.value==="reservation"

updateEmailRequirement()
resetProgress()
durationSelect.value=""
paddockSelect.innerHTML='<option value="">Choisir</option>'

document.getElementById("blocDuration").style.display=mise?"none":"block"
document.getElementById("blocPaddock").style.display=mise?"none":"block"
document.getElementById("stepPlanning").style.display=mise?"none":"block"

document.getElementById("mainButton").innerText=mise?"Demander":"Réserver"

if(mise){

showStep("stepDay")

}else if(reservation){

showStep("stepOptions")

}

})

}

function updatePaddocks(){

const duration=durationSelect.value

resetAfterOptionChange()

paddockSelect.innerHTML=""

if(duration==="90"){

paddockSelect.innerHTML=`
<option value="">Choisir</option>
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
`

}else if(duration==="60"){

paddockSelect.innerHTML=`
<option value="">Choisir</option>
<option value="maison">Maison</option>
<option value="grande">Grande voie</option>
<option value="beudot">Beudot</option>
`

}else{

paddockSelect.innerHTML='<option value="">Choisir</option>'

}

generate()

}

durationSelect.addEventListener("change",updatePaddocks)

async function loadDataRealtime(){
try{
const data=await paddockApi("/api/paddocks/planning")
const nextSignature=JSON.stringify([data.reservations||[],data.horaires||{},data.restrictions||{}])
const planningChanged=nextSignature!==lastPlanningSignature
lastPlanningSignature=nextSignature
reservations=data.reservations||[]
horaires=data.horaires||{}
restrictions=data.restrictions||{}
currentViewer=data.viewer
adminMode=currentViewer?.role==="admin"
title.innerHTML=adminMode?"RÉSERVATION 🔧":"RÉSERVATION"
document.getElementById("bookingIdentity").textContent=currentViewer?"Réservation au nom de "+currentViewer.firstName:""
reservationsLoaded=true
horairesLoaded=true
updateEmailRequirement()
if(!planningChanged)return
renderTodayAvailability()
generate()
}catch(error){
console.warn("Chargement paddock impossible",error)
}
}

function buildDays(){

const container=document.getElementById("days")
container.innerHTML=""

for(let i=0;i<3;i++){

let d=new Date()
d.setDate(d.getDate()+i)

let label=i===0?"Aujourd’hui":i===1?"Demain":"Après-demain"

let btn=document.createElement("div")
btn.className="dayBtn"

btn.innerText=label+" "+d.getDate()

btn.onclick=()=>{

selectedDate=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")
selected=null

document.querySelectorAll(".dayBtn").forEach(b=>b.classList.remove("active"))
btn.classList.add("active")

generate()

hideStep("stepDetails")
hideStep("stepButton")

if(document.getElementById("type").value==="mise"){

showStep("stepDetails")
showStep("stepButton")

}else{

showStep("stepPlanning")

}

}

container.appendChild(btn)

}

}

function timeToMinutes(value){

const [hours,minutes]=String(value || "").split(":").map(Number)

if(!Number.isInteger(hours) || !Number.isInteger(minutes)) return NaN
if(hours<0 || hours>23 || minutes<0 || minutes>59) return NaN

return (hours*60)+minutes

}

function minutesToTime(total){

const hours=Math.floor(total/60)
const minutes=total%60

return String(hours).padStart(2,"0")+":"+
       String(minutes).padStart(2,"0")

}

function fitsBeforeClosing(startMinutes,durationMinutes,closingMinutes){

return Number.isFinite(startMinutes) &&
       Number.isFinite(durationMinutes) &&
       Number.isFinite(closingMinutes) &&
       startMinutes+durationMinutes<=closingMinutes

}

function localDateKey(date){

return date.getFullYear()+"-"+
       String(date.getMonth()+1).padStart(2,"0")+"-"+
       String(date.getDate()).padStart(2,"0")

}

function firstFreeSlotToday(paddock,now){

const today=localDateKey(now)
const names=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"]
const config=horaires[paddock] && horaires[paddock][names[now.getDay()]]

if(!config || config.closed){
return {state:"closed",label:"Fermé"}
}

const openMinutes=timeToMinutes(config.open)
const closeMinutes=timeToMinutes(config.close)

if(!Number.isFinite(openMinutes) || !Number.isFinite(closeMinutes)){
return {state:"full",label:"Complet"}
}

let current=openMinutes

while(current<closeMinutes){

const slotDate=new Date(
now.getFullYear(),
now.getMonth(),
now.getDate(),
Math.floor(current/60),
current%60
)

const startsSoon=(slotDate-now)/60000<10
const conflict=reservations.some(r=>{

if(r.date!==today || r.paddock!==paddock) return false

const reservationStart=timeToMinutes(r.time)
const reservationEnd=reservationStart+Number(r.duration)

return current<reservationEnd && current+60>reservationStart

})

if(!startsSoon &&
   fitsBeforeClosing(current,60,closeMinutes) &&
   !conflict){
return {state:"free",label:minutesToTime(current)}
}

const reservationAtStart=reservations.find(r=>{
return r.date===today &&
       r.paddock===paddock &&
       timeToMinutes(r.time)===current
})

if(reservationAtStart){
const reservationDuration=Number(reservationAtStart.duration)
current+=Number.isFinite(reservationDuration) && reservationDuration>0
    ? reservationDuration
    : 60
}else{
current+=60
}

}

return {state:"full",label:"Complet"}

}

function renderTodayAvailability(){

if(!reservationsLoaded || !horairesLoaded) return

const now=new Date()
const paddocks=[
{id:"Maison",key:"maison"},
{id:"Grande",key:"grande"},
{id:"Beudot",key:"beudot"}
]

paddocks.forEach(item=>{

const element=document.getElementById("availability"+item.id)
const availability=firstFreeSlotToday(item.key,now)

element.className="todayAvailabilityValue "+availability.state
element.textContent=availability.label

})

}

function generate(){

const paddock=paddockSelect.value
const requestedDuration=parseInt(durationSelect.value)

if(!paddock || !selectedDate || !requestedDuration)return

const container=document.getElementById("planning")
container.innerHTML=""

const ninetyBlocked=isNinetyBlocked(paddock,selectedDate,requestedDuration)
const duration=ninetyBlocked ? 60 : requestedDuration

if(ninetyBlocked){
selected=null
hideStep("stepDetails")
hideStep("stepButton")
container.innerHTML='<div class="restrictionMessage">⚠️ 1h30 indisponible pour cette date. Les créneaux affichés sont en 1h.</div>'
}

const parts=selectedDate.split("-")
const d=new Date(parts[0],parts[1]-1,parts[2])

const names=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"]

let jour=names[d.getDay()]

if(!horaires[paddock] || !horaires[paddock][jour] || horaires[paddock][jour].closed){

container.innerHTML='<div class="fullMessage">Paddock fermé</div>'
return

}

const config=horaires[paddock][jour]

let startMinutes=timeToMinutes(config.open)
let closeMinutes=timeToMinutes(config.close)

if(!Number.isFinite(startMinutes) || !Number.isFinite(closeMinutes)){
container.innerHTML='<div class="fullMessage">Horaires indisponibles</div>'
return
}

let slots=[]
let current=startMinutes

while(current < closeMinutes){

if(fitsBeforeClosing(current,duration,closeMinutes)){
slots.push(minutesToTime(current))
}

let reservation=reservations.find(r=>{

if(r.date!==selectedDate) return false
if(r.paddock!==paddock) return false

return timeToMinutes(r.time)===current

})

if(reservation){
const reservationDuration=Number(reservation.duration)
current += Number.isFinite(reservationDuration) && reservationDuration>0
    ? reservationDuration
    : 60
}else{
current += 60
}

}

slots.forEach(time=>{

let slotStartMinutes=timeToMinutes(time)
let hour=Math.floor(slotStartMinutes/60)
let minutes=slotStartMinutes%60

const now=new Date()
const today=now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0")+"-"+String(now.getDate()).padStart(2,"0")

let slotTime=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hour,minutes)

if(!adminMode && selectedDate===today){

let diff=(slotTime-now)/60000

if(diff<10) return

}

if(!fitsBeforeClosing(slotStartMinutes,duration,closeMinutes)) return

let conflict=false
let mine=false
let docId=null
let reserverName=""
let conflictReservation=null

reservations.forEach(r=>{

if(r.date===selectedDate && r.paddock===paddock){

let resStart=timeToMinutes(r.time)
let resEnd=resStart+Number(r.duration)
let slotEnd=slotStartMinutes+duration

// Les deux créneaux se chevauchent ?
if(slotStartMinutes < resEnd && slotEnd > resStart){

    conflict = true
    reserverName = r.name
    conflictReservation = r

    if(r.mine){
        mine = true
        docId = r.id
    }

    if(adminMode){
        docId = r.id
    }

}

}

})
let oneHourPossible = false

if(conflict && duration === 90){

    let slotEnd = slotStartMinutes + 60

    oneHourPossible = !reservations.some(r=>{

        if(r.date!==selectedDate) return false
        if(r.paddock!==paddock) return false

        let resStart = timeToMinutes(r.time)
        let resEnd = resStart + Number(r.duration)

        return slotStartMinutes < resEnd && slotEnd > resStart

    }) && fitsBeforeClosing(slotStartMinutes,60,closeMinutes)

}

let row=document.createElement("div")

if(mine){

row.className="row"
row.innerHTML=`<div>${time}</div><div class="mineText">Annuler</div>`
row.onclick=()=>cancelReservation(docId)

}

else if(!conflict){

row.className="row free"

row.innerHTML=ninetyBlocked
    ? `<div>${time}</div><div class="shortText">Libre 1h</div>`
    : `<div>${time}</div><div class="freeText">libre</div>`

row.onclick=()=>{

selected={time,paddock,date:selectedDate,duration}

keepOnlySelectedSlot(row)

showStep("stepDetails")
showStep("stepButton")

}

}

else{

row.className="row"

if(adminMode){

    row.innerHTML=`<div>${time}</div><div class="reservedText">${reserverName}</div>`
    row.onclick=()=>cancelReservation(docId)

}else if(oneHourPossible){

    row.className="row free";
    row.innerHTML=`<div>${time}</div><div class="shortText">Libre 1h</div>`;

    row.onclick=()=>switchToOneHour(time,paddock);

}else{

    if(conflictReservation && String(conflictReservation.name || "").toLowerCase().startsWith("blocage")){

        let [bh,bm] = conflictReservation.time.split(":").map(Number)
        let endMinutes = (bh*60)+bm+conflictReservation.duration
        let endHour = Math.floor(endMinutes/60)%24
        let endMinute = endMinutes%60
        let startLabel = String(bh).padStart(2,"0")+"h"+String(bm).padStart(2,"0")
        let endLabel = String(endHour).padStart(2,"0")+"h"+String(endMinute).padStart(2,"0")

        row.innerHTML=`<div>${time}</div><div class="closedBlockText"><span>🚫 Fermé</span><span class="closedBlockTime">${startLabel} → ${endLabel}</span></div>`

    }else{

    row.innerHTML=`<div>${time}</div><div class="reservedText">réservé</div>`

    }

}

}

container.appendChild(row)

})

}

function isNinetyBlocked(paddock,date,duration){

if(duration!==90) return false

const restriction=restrictions[date]

if(!restriction) return false

if(paddock==="grande" && restriction.blockGrande90) return true
if(paddock==="beudot" && restriction.blockBeudot90) return true

return false

}

function switchToOneHour(time, paddock){

    const date = selectedDate;

    durationSelect.value = "60";
    updatePaddocks();

    paddockSelect.value = paddock;
    selectedDate = date;

    showStep("stepPlanning");
    generate();

    setTimeout(()=>{

        document.querySelectorAll("#planning .row.free").forEach(r=>{

            if(r.firstElementChild.innerText===time){
                r.click();
            }

        });

    },0);

}

async function book(){

const type=document.getElementById("type").value

if(type==="mise"){

if(!selectedDate){
alert("Choisissez un jour")
return
}

const d=new Date(selectedDate)
const day=d.getDay()

if(day===0 || day===6){
alert("Demande impossible le week-end")
return
}

const now=new Date()
const veille=new Date(d)

veille.setDate(veille.getDate()-1)
veille.setHours(20,0,0,0)

if(now>veille){
alert("Demande possible uniquement jusqu'à 20h la veille")
return
}

let name=currentViewer?.firstName||""
let email=currentViewer?.email||""

if(!name||!email){alert("Compte utilisateur incomplet");return}

let createdRequest
try{
createdRequest=await paddockApi("/api/paddocks/requests",{
method:"POST",
body:JSON.stringify({date:selectedDate})
})
}catch(error){
alert(error.message)
return
}

AppMailer.sendPaddockRequestConfirmation({
customer:{
email:email,
firstName:name
},
date:selectedDate,
requestId:createdRequest.request.id
}).catch(error=>{
console.warn("Confirmation email non envoyée",error)
})

showSheet(
"Demande envoyée",
"Jour : "+selectedDate+"<br>Nous vous confirmerons la mise au paddock."
)

return

}

let name=currentViewer?.firstName||""

if(!name){alert("Compte utilisateur incomplet");return}

if(!selected){
alert("Choisissez un créneau")
return
}

if(isNinetyBlocked(selected.paddock,selected.date,selected.duration)){
selected=null
generate()
hideStep("stepDetails")
hideStep("stepButton")
return
}

if(!adminMode){

if(reservations.find(r=>r.date===selected.date && r.name.toLowerCase()===name.toLowerCase())){
alert("Vous avez déjà une réservation ce jour")
return
}

}

// ← ICI

let slotStartMinutes=timeToMinutes(selected.time);
let slotEndMinutes=slotStartMinutes+Number(selected.duration);

const selectedDateParts=selected.date.split("-");
const selectedDayDate=new Date(
    selectedDateParts[0],
    selectedDateParts[1]-1,
    selectedDateParts[2]
);
const selectedDayNames=["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const selectedDay=selectedDayNames[selectedDayDate.getDay()];
const selectedHours=horaires[selected.paddock] && horaires[selected.paddock][selectedDay];
const selectedClosingTime=selectedHours && !selectedHours.closed
    ? timeToMinutes(selectedHours.close)
    : NaN;

if(!fitsBeforeClosing(slotStartMinutes,Number(selected.duration),selectedClosingTime)){
    alert("Ce créneau ne permet pas de terminer avant la fermeture du paddock.");
    selected=null;
    generate();
    hideStep("stepDetails");
    hideStep("stepButton");
    return;
}

const conflit = reservations.some(r => {

    if(r.date !== selected.date) return false;
    if(r.paddock !== selected.paddock) return false;

    let resStart = timeToMinutes(r.time);
    let resEnd = resStart + Number(r.duration);

    return slotStartMinutes < resEnd && slotEndMinutes > resStart;

});

if(conflit){
    alert("Ce créneau vient d'être réservé par un autre utilisateur.");
    generate();
    return;
}

// Puis seulement ici :

let created
try{
created=await paddockApi("/api/paddocks/reservations",{
method:"POST",
body:JSON.stringify({
paddock:selected.paddock,
date:selected.date,
time:selected.time,
duration:selected.duration,
confirmationRequested:confirmEmail.checked
})
})
}catch(error){
alert(error.message)
await loadDataRealtime()
return
}

let email=currentViewer.email

// 👉 envoi client uniquement si email
if(confirmEmail.checked && email && email.includes("@")){

AppMailer.sendPaddockReservationConfirmation({
reservationId:created.reservation.id,
customer:{
email:email,
firstName:name
},
paddock:selected.paddock,
date:selected.date,
time:selected.time,
duration:selected.duration
}).catch(error=>{
console.warn("Confirmation email non envoyée",error)
})
}

// 👉 TOUJOURS exécuté (important)
myReservations.push(created.reservation.id)

localStorage.setItem("myReservations",JSON.stringify(myReservations))

showSheet(
"Réservation confirmée",
"Paddock : "+selected.paddock+"<br>"+
"Jour : "+selected.date+"<br>"+
"Heure : "+selected.time
)

}


async function cancelReservation(id){

if(!confirm("⚠️ Confirmer l'annulation de cette réservation ?")){
return
}

try{
await paddockApi("/api/paddocks/reservations/"+encodeURIComponent(id),{method:"DELETE"})
}catch(error){
alert(error.message)
return
}

myReservations = myReservations.filter(r => r !== id)

localStorage.setItem("myReservations", JSON.stringify(myReservations))

showSheet(
"Réservation annulée",
"Le créneau a été libéré."
)

}

})

showDayIfOptionsReady()
resetAfterPaddockChange()

if(event.detail?.type==="paddocks"||event.detail?.type==="all")loadDataRealtime()
})
