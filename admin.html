</div>
<h1>ADMIN</h1>
</header>

<main class="admin-shell" aria-labelledby="adminTitle">
<section class="admin-card admin-intro">
<p class="admin-kicker">Thèmes saisonniers</p>
<h2 id="adminTitle">Atelier de test local</h2>
<p>Cette page pilote uniquement cet appareil. Elle ne modifie pas Firebase, OneSignal, ni les clients.</p>
</section>

<form class="admin-card admin-form" id="themeAdminForm">
<div class="admin-field">
<label for="themeMode">Thème</label>
<select id="themeMode">
<option value="auto">Automatique depuis le code</option>
<option value="force">Forcer un thème sur cet appareil</option>
</select>
</div>

<div class="admin-field">
<label for="themeSelect">Choix du thème</label>
<select id="themeSelect">
<option value="summer">Summer</option>
<option value="autumn">Autumn</option>
<option value="christmas">Christmas</option>
<option value="winter">Winter</option>
<option value="spring">Spring</option>
</select>
</div>

<div class="admin-field">
<label for="daypartMode">Moment de journée</label>
<select id="daypartMode">
<option value="auto">Automatique selon le soleil</option>
<option value="force">Forcer une ambiance sur cet appareil</option>
</select>
</div>

<div class="admin-field">
<label for="daypartSelect">Choix de l’ambiance</label>
<select id="daypartSelect">
<option value="dawn">Dawn</option>
<option value="day">Day</option>
<option value="sunset">Sunset</option>
<option value="night">Night</option>
</select>
</div>

<button class="admin-primary" type="submit">Appliquer sur cet appareil</button>
<button class="admin-secondary" id="resetThemeAdmin" type="button">Revenir en automatique</button>
<p class="admin-status" id="adminStatus" aria-live="polite"></p>
