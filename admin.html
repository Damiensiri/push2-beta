<body class="app-page admin-page">

<div class="ambient-stage" aria-hidden="true"></div>

<div class="page" id="page">

<header class="plan-header">
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg" alt="">
</div>
<h1>ADMIN</h1>
</header>

<main class="admin-shell" aria-labelledby="adminTitle">
<section class="admin-card admin-intro">
<p class="admin-kicker">Thèmes saisonniers</p>
<h2 id="adminTitle">Administration du thème</h2>
<p>Cette page pilote uniquement l’ambiance saisonnière publiée. Elle ne modifie ni Firebase, ni OneSignal, ni les horaires de lumière.</p>
<div class="admin-current">
<span>Thème publié</span>
<strong id="currentTheme">—</strong>
</div>
</section>

<form class="admin-card admin-form" id="themeAdminForm">
<div class="admin-field">
<label for="themeSelect">Choisir le thème actif</label>
<select id="themeSelect">
<option value="summer">Summer</option>
<option value="autumn">Autumn</option>
<option value="christmas">Christmas</option>
<option value="winter">Winter</option>
<option value="spring">Spring</option>
</select>
</div>

<div class="admin-field">
<label for="adminToken">Code admin</label>
<input id="adminToken" name="adminToken" type="password" autocomplete="current-password" placeholder="Code de validation">
</div>

<button class="admin-primary" type="submit">Publier ce thème</button>
<button class="admin-secondary" id="refreshThemeAdmin" type="button">Relire le thème publié</button>
<p class="admin-status" id="adminStatus" aria-live="polite"></p>
</form>

<section class="admin-card">
<p class="admin-kicker">Aperçu rapide</p>
