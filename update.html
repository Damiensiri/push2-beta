<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<title>Mise à jour</title>
<script src="assets/js/auth-guard-beta.js?v=20260724-11"></script>
</head>
<body>
<script>
const APP_VERSION="20260724-11";
const APP_BASE_URL=new URL("./",window.location.href);
const APP_URL=new URL(`index.html?v=${APP_VERSION}`,APP_BASE_URL).href;
(async()=>{
try{if("serviceWorker" in navigator){const registration=await navigator.serviceWorker.getRegistration(APP_BASE_URL.href);if(registration)await registration.update()}}catch(e){}

window.location.replace(APP_URL);
})();
</script>
</body>
</html>
