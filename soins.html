<style>

/* BASE */
body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f4f4f4;
color:#000;
transition:.3s;
}

/* HEADER */
header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{
width:22px;
height:22px;
}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
font-weight:700;
}

/* FEATURED */
#featured{
margin:10px;
border-radius:18px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
transition:transform .25s ease, opacity .25s ease;
}

#featured img{
width:100%;
height:180px;
object-fit:cover;
}

#featuredContent{
padding:16px;
background:white;
}

/* GRID */
#products{
padding:10px;
padding-bottom:120px;
display:grid;
gap:16px;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.imgBox{
height:140px;
position:relative;
}

.imgBox img{
width:100%;
height:100%;
object-fit:cover;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:#ff4757;
color:white;
padding:4px 10px;
border-radius:20px;
font-size:12px;
}

.content{
padding:14px;
}

.title{
font-weight:700;
font-size:18px;
}

.desc{
font-size:14px;
opacity:.7;
margin:6px 0;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.price{
font-weight:700;
font-size:18px;
}

button{
background:#181E3B;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
cursor:pointer;
}

/* PANIER */
#cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:#181E3B;
color:white;
padding:12px 16px;
border:none;
border-radius:30px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
cursor:pointer;
z-index:100;
}

#cartPanel{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:white;
padding:20px;
transform:translateX(100%);
transition:transform .35s ease;
overflow:auto;
z-index:200;
}

#cartPanel.open{
transform:translateX(0);
}

.closeCart{
font-size:26px;
width:46px;
height:46px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
background:#181E3B;
color:white;
border:none;
cursor:pointer;
}

.cartItem{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.qty{
display:flex;
gap:6px;
}

.qty button{
padding:4px 8px;
}

/* INPUT */
#cartPanel input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
background:#f4f4f4;

/* 🔥 ANTI ZOOM SAFARI */
font-size:16px;
}

/* BOUTON COMMANDER */
.checkoutBtn{
display:block;
margin:20px auto 0 auto;
width:90%;
font-size:18px;
font-weight:700;
padding:16px;
border-radius:16px;
box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

/* ANIMATIONS */
@keyframes cartPulse{
0%{transform:scale(1)}
40%{transform:scale(1.25)}
100%{transform:scale(1)}
}

.pulse{
animation:cartPulse .4s ease;
}

.flyImg{
position:fixed;
z-index:9999;
pointer-events:none;
border-radius:12px;
transition:all .7s cubic-bezier(.2,.8,.2,1);
}

/* DARK MODE */
@media(prefers-color-scheme:dark){
body{background:#0f1115;color:white;}
.card{background:#1c1f26;}
#featuredContent{background:#1c1f26;}
#cartPanel{background:#1c1f26;}
#cartPanel input{background:#252a33;color:white;}
button{background:#2e43b8;}
#cartBtn{background:#2e43b8;}
.closeCart{background:#2e43b8;}

#backBtn{
background:#1c1f26;
box-shadow:0 12px 30px rgba(0,0,0,0.6);
}

#backBtn img{
filter:brightness(0) invert(1);
}
}

</style>

<body class="fullscreen-standard">

<div class="ambient-stage" aria-hidden="true"></div>

<header class="plan-header">
<div id="backBtn" onclick="location.href='index.html'">
<img src="image/back.svg">
</div>
<h1>SOINS</h1>
</header>

<div id="featured"></div>
<div id="products"></div>

<button id="cartBtn" onclick="toggleCart()">
🛒 <span id="count">0</span>
</button>

<div id="cartPanel">

<div style="display:flex;justify-content:space-between;align-items:center">
<h2>Panier</h2>
<button class="closeCart" onclick="toggleCart()">✕</button>
</div>

<div id="cartItems"></div>

<p>Total : <b><span id="total">0</span> €</b></p>

<hr>

<input id="clientNom" placeholder="Nom *">
<input id="clientPrenom" placeholder="Prénom *">
<input id="clientEmail" placeholder="Email *">

<button class="checkoutBtn" onclick="checkout()">Commander</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

emailjs.init("03cdce-AcdCC03k_v")

const SHEET_URL="https://opensheet.elk.sh/1ka6djXZhsDBbF77OVgH5wjqQwLpMUUPbMl1RD_rssXI/soins"

let cart = JSON.parse(localStorage.getItem("cart") || "[]")
let products=[]

fetch(SHEET_URL)
.then(r=>r.json())
.then(data=>{
products=data.filter(p=>p.actif==="TRUE").sort((a,b)=>Number(a.rang)-Number(b.rang))
render()
updateCart()
})

function render(){

products.forEach(p=>{

if(p.featured==="TRUE"){

document.getElementById("featured").innerHTML=`
<img src="${p.image}">
<div id="featuredContent">
<h2>${p.nom}</h2>
<p>${p.description}</p>
<b>${p.prix} €</b>
<br><br>
<button class="addBtn" data-name="${encodeURIComponent(p.nom)}" data-price="${p.prix}">Ajouter</button>
</div>
`

}else{

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="imgBox">
<img src="${p.image}">
${p.badge?`<div class="badge">${p.badge}</div>`:""}
</div>
<div class="content">
<div class="title">${p.nom}</div>
<div class="desc">${p.description}</div>
<div class="bottom">
<div class="price">${p.prix} €</div>
<button class="addBtn" data-name="${encodeURIComponent(p.nom)}" data-price="${p.prix}">Ajouter</button>
</div>
</div>
`

document.getElementById("products").appendChild(card)

}

})

}

/* CLICK GLOBAL (FIX BOUTON) */
document.addEventListener("click", function(e){
if(e.target.classList.contains("addBtn")){
let btn = e.target
let name = decodeURIComponent(btn.dataset.name)
let price = Number(btn.dataset.price)
addCart(name, price, btn)
}
})

/* AJOUT PANIER */
function addCart(name,price,btn){

let original=btn.innerText
btn.innerText="✓ Ajouté"
setTimeout(()=>btn.innerText=original,1000)

let img = btn.closest(".card, #featuredContent")?.querySelector("img")

if(img){
let rect = img.getBoundingClientRect()
let cartRect = document.getElementById("cartBtn").getBoundingClientRect()

let fly = img.cloneNode(true)
fly.classList.add("flyImg")

fly.style.left = rect.left+"px"
fly.style.top = rect.top+"px"
fly.style.width = rect.width+"px"
fly.style.height = rect.height+"px"

document.body.appendChild(fly)

setTimeout(()=>{
fly.style.left = cartRect.left+"px"
fly.style.top = cartRect.top+"px"
fly.style.width = "20px"
fly.style.height = "20px"
fly.style.opacity="0.3"
},10)

setTimeout(()=>fly.remove(),700)
}

let item=cart.find(i=>i.name===name)
if(item){item.qty++}else{cart.push({name,price,qty:1})}

updateCart()

let cartBtn=document.getElementById("cartBtn")
cartBtn.classList.add("pulse")
setTimeout(()=>cartBtn.classList.remove("pulse"),400)
}

/* PANIER */
function updateCart(){
localStorage.setItem("cart", JSON.stringify(cart))

let count=cart.reduce((a,b)=>a+b.qty,0)
document.getElementById("count").innerText=count

let html=""
let total=0

cart.forEach((item,i)=>{
html+=`
<div class="cartItem">
<div>${item.name}<br>${item.price}€</div>
<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
${item.qty}
<button onclick="changeQty(${i},1)">+</button>
</div>
</div>
`
total+=item.price*item.qty
})

document.getElementById("cartItems").innerHTML=html
document.getElementById("total").innerText=total
}

function changeQty(i,v){
cart[i].qty+=v
if(cart[i].qty<=0){cart.splice(i,1)}
updateCart()
}

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("open")
}

/* CHECKOUT */
function checkout(){

let nom=clientNom.value.trim()
let prenom=clientPrenom.value.trim()
let email=clientEmail.value.trim()

if(!nom || !prenom || !email){
alert("Veuillez remplir Nom, Prénom et Email")
return
}

let commande=""
let total=0

cart.forEach(item=>{

let lineTotal=item.price*item.qty

commande += `${item.name} x${item.qty} = ${lineTotal} €\n`

total += lineTotal

})

emailjs.send("service_mkpsbdf","template_ftv15rb",{
nom,
prenom,
email,
commande,
total
})
.then(()=>{

let orderId = Date.now()
let dateISO = new Date().toISOString()

let commandeText = commande

/* 🔥 AJOUT ICI (LOCAL STORAGE) */
let orders = JSON.parse(localStorage.getItem("orders") || "[]")

orders.push({
id:orderId,
date:new Date().toLocaleString(),
items:[...cart],
total:total
})

localStorage.setItem("orders", JSON.stringify(orders))

/* GOOGLE FORM */
fetch("https://docs.google.com/forms/d/e/1FAIpQLSd7FyCadHVREHz5A_Y3tGIANItJppc-xx2hEtopxd90lU50Hw/formResponse",{
method:"POST",
mode:"no-cors",
body:new URLSearchParams({
"entry.1196863567":nom,
"entry.1084486832":prenom,
"entry.322695866":email,
"entry.1740027870":commandeText,
"entry.99574245":total,
"entry.1184215130":orderId,
"entry.489600561":dateISO,
"entry.1098731878":"En attente",
"entry.484692587":""
})
})
cart = []
updateCart()
setTimeout(()=>{
  
window.location.href="mes-commandes.html"
},700)

})
}

/* SCROLL */
const featured=document.getElementById("featured")

window.addEventListener("scroll",()=>{
if(!featured) return

let scroll=window.scrollY
let scale=1-(scroll/700)
if(scale<0.85) scale=0.85

featured.style.transform="scale("+scale+")"

let opacity=1-(scroll/500)
if(opacity<0.35) opacity=0.35

featured.style.opacity=opacity
})

</script>

<script>
/* Identité visuelle : ambiance solaire locale, sans dépendance réseau. */
(function initializeSolarAmbiance(){
  const latitude=48.391;
  const longitude=4.527;
  const timeZone="Europe/Paris";
  const radians=Math.PI/180;
  const themeColors={
    night:"#061225",
    dawn:"#1f3155",
    morning:"#2c86c5",
    day:"#287fbd",
    golden:"#9b684f",
    dusk:"#1f3155"
  };

  function localClock(date){
    const parts={};
    new Intl.DateTimeFormat("en-CA",{
      timeZone,
      year:"numeric",
      month:"2-digit",
      day:"2-digit",
      hour:"2-digit",
      minute:"2-digit",
      hourCycle:"h23",
      timeZoneName:"shortOffset"
    }).formatToParts(date).forEach(part=>{
      if(part.type!=="literal")parts[part.type]=part.value;
    });

    const offsetMatch=(parts.timeZoneName||"GMT+1").match(/GMT([+-]?\d+(?::\d+)?)/);
    const offsetText=offsetMatch?offsetMatch[1]:"1";
    const offsetParts=offsetText.split(":");
    const offsetHours=Number(offsetParts[0])+(Number(offsetParts[1]||0)/60)*Math.sign(Number(offsetParts[0])||1);
    const dayStart=Date.UTC(Number(parts.year),Number(parts.month)-1,Number(parts.day));
    const yearStart=Date.UTC(Number(parts.year),0,1);

    return{
      minutes:Number(parts.hour)*60+Number(parts.minute),
      dayOfYear:Math.floor((dayStart-yearStart)/86400000)+1,
      offsetHours
    };
  }

  function solarTimes(clock){
    const gamma=(2*Math.PI/365)*(clock.dayOfYear-1);
    const equationOfTime=229.18*(.000075+.001868*Math.cos(gamma)-.032077*Math.sin(gamma)-.014615*Math.cos(2*gamma)-.040849*Math.sin(2*gamma));
    const declination=.006918-.399912*Math.cos(gamma)+.070257*Math.sin(gamma)-.006758*Math.cos(2*gamma)+.000907*Math.sin(2*gamma)-.002697*Math.cos(3*gamma)+.00148*Math.sin(3*gamma);
    const zenith=90.833*radians;
    const hourAngle=Math.acos((Math.cos(zenith)/(Math.cos(latitude*radians)*Math.cos(declination)))-Math.tan(latitude*radians)*Math.tan(declination));
    const solarNoon=720-4*longitude-equationOfTime+clock.offsetHours*60;
    const daylightMinutes=(hourAngle/radians)*8;

    return{
      sunrise:solarNoon-daylightMinutes/2,
      noon:solarNoon,
      sunset:solarNoon+daylightMinutes/2
    };
  }

  function phaseFor(minutes,times){
    if(minutes<times.sunrise-55||minutes>=times.sunset+50)return"night";
    if(minutes<times.sunrise+35)return"dawn";
    if(minutes<times.noon-80)return"morning";
    if(minutes<times.sunset-115)return"day";
    if(minutes<times.sunset-25)return"golden";
    return"dusk";
  }

  function updateAmbiance(){
    const clock=localClock(new Date());
    const times=solarTimes(clock);
    const phase=phaseFor(clock.minutes,times);
    const daylightProgress=Math.max(0,Math.min(1,(clock.minutes-times.sunrise)/(times.sunset-times.sunrise)));
    const solarHeight=Math.sin(Math.PI*daylightProgress);

    document.body.dataset.dayPhase=phase;
    document.body.style.setProperty("--solar-x",(10+80*daylightProgress).toFixed(2)+"%");
    document.body.style.setProperty("--solar-y",(62-47*solarHeight).toFixed(2)+"%");
    document.body.dataset.sunrise=Math.round(times.sunrise);
    document.body.dataset.sunset=Math.round(times.sunset);

    const themeMeta=document.querySelector('meta[name="theme-color"]');
    if(themeMeta)themeMeta.setAttribute("content",themeColors[phase]||themeColors.day);
  }

  updateAmbiance();
  setInterval(updateAmbiance,60000);
})();
</script>
