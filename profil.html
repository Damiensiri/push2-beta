<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mon profil</title>

<meta name="theme-color" content="#287fbd">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<script src="assets/js/app-config.js?v=20260724-11"></script>
<script src="assets/js/app-layout.js?v=20260724-11"></script>

<link rel="stylesheet" href="assets/css/app.css?v=20260724-11">
<link rel="stylesheet" href="assets/css/themes/summer.css?v=20260724-11">
<link rel="stylesheet" href="assets/css/themes/autumn.css?v=20260724-11">
<link rel="stylesheet" href="assets/css/themes/christmas.css?v=20260724-11">
<link rel="stylesheet" href="assets/css/themes/winter.css?v=20260724-11">
<link rel="stylesheet" href="assets/css/themes/spring.css?v=20260724-11">
<link rel="stylesheet" href="assets/css/pages/profil.css?v=20260724-11">
</head>

<body class="app-page">

<div class="ambient-stage" aria-hidden="true"></div>

<div class="page" id="page">

<header class="plan-header">
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg" alt="">
</div>
<h1>MON PROFIL</h1>
</header>

<section class="profile-card profile-form account-card" aria-labelledby="accountTitle">
<div class="account-summary">
<div class="profile-photo__preview account-photo">
<img id="profilePhotoPreview" alt="Photo de profil" hidden>
<svg id="profilePhotoFallback" viewBox="0 0 24 24" fill="none" aria-hidden="true">
<circle cx="12" cy="8" r="3.2"/>
<path d="M5.5 20c.6-4 2.8-6 6.5-6s5.9 2 6.5 6"/>
</svg>
</div>
<div><div class="profile-section-title" id="accountTitle">Compte connecté</div>
<h2 id="accountIdentity">Chargement…</h2></div>
</div>
<div class="profile-photo__actions account-photo-actions">
<label class="profile-photo__button">Changer la photo<input id="profilePhotoInput" type="file" accept="image/*"></label>
<button class="profile-secondary" id="removePhoto" type="button" hidden>Supprimer</button>
</div>
<p id="profilePhotoStatus" class="profile-save-status" aria-live="polite"></p>
<dl class="account-details"><div><dt>Adresse email</dt><dd id="accountEmailDisplay">—</dd></div></dl>
<button id="openEmailChange" class="profile-secondary account-password-button" type="button">Changer mon adresse email</button>
<form id="accountEmailForm" class="profile-form" hidden>
<div class="profile-field"><label for="newEmail">Nouvelle adresse email</label><input id="newEmail" type="email" maxlength="160" autocomplete="email" required></div>
<div class="profile-field"><label for="emailCurrentPassword">Mot de passe actuel</label><input id="emailCurrentPassword" type="password" autocomplete="current-password" required></div>
<button class="profile-primary" type="submit">Enregistrer la nouvelle adresse</button>
</form>
<button id="openPasswordChange" class="profile-secondary account-password-button" type="button">Changer mon mot de passe</button>
<form id="accountPasswordForm" class="profile-form" hidden>
<p id="accountPasswordHelp" class="account-warning">Choisissez un nouveau mot de passe.</p>
<div class="profile-field"><label for="currentPassword">Mot de passe actuel</label><input id="currentPassword" type="password" autocomplete="current-password" required></div>
<div class="profile-field"><label for="newPassword">Nouveau mot de passe</label><input id="newPassword" type="password" minlength="12" maxlength="200" autocomplete="new-password" required></div>
<button class="profile-primary" type="submit">Enregistrer le nouveau mot de passe</button>
</form>
<button id="accountLogout" class="profile-secondary account-logout" type="button">Se déconnecter</button>
<p id="accountStatus" class="profile-save-status" aria-live="polite"></p>
</section>

<section class="profile-card profile-paddock-card" aria-labelledby="profileCardTitle">
<div class="profile-section-title">Carte paddock</div>
<div id="profileCardContent" aria-live="polite">
<p class="profile-card-message">Actualisation de la carte…</p>
</div>
</section>

</div>

<div class="profile-dialog profile-crop-dialog" id="cropDialog" role="dialog" aria-modal="true" aria-labelledby="cropTitle" hidden>
<div class="profile-dialog__card">
<h2 id="cropTitle">Recadrer la photo</h2>
<p>Déplacez et agrandissez la photo pour choisir votre cadrage.</p>
<div class="profile-crop">
<canvas id="cropCanvas" width="512" height="512" aria-label="Aperçu du recadrage"></canvas>
</div>
<label class="profile-crop__zoom" for="cropZoom">
Zoom
<input id="cropZoom" type="range" min="1" max="3" step="0.01" value="1">
</label>
<div class="profile-dialog__actions">
<button class="profile-secondary" id="cancelCrop" type="button">Annuler</button>
<button class="profile-primary" id="confirmCrop" type="button">Valider la photo</button>
</div>
</div>
</div>

<script src="assets/js/profile-store.js?v=20260724-11"></script>
<script src="assets/js/pages/profil.js?v=20260724-11"></script>
<script src="assets/js/account-beta.js?v=20260724-11"></script>

</body>
</html>
