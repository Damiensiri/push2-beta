    </dialog><script type="text/javascript">
const API='https://ecurie-notifications-beta.damiensiri-pro.workers.dev',KEY='ecurie_planning_beta_device_token',$=id=>document.getElementById(id),days=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'],labels={paddock:'Paddock',travail:'Travail',longe:'Longe',repos:'Repos',concours:'Concours',proprietaire:'Propriétaire',autre:'Autre'};let selected=iso(new Date()),week=monday(new Date()),mode='day',state={horses:[],tasks:[]},busy=new Set();function iso(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function monday(d){d=new Date(d);d.setHours(12,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));return iso(d)}function add(value,n){const d=new Date(value+'T12:00:00');d.setDate(d.getDate()+n);return iso(d)}function dayIndex(){return (new Date(selected+'T12:00:00').getDay()+6)%7}function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[c])}async function api(path,opt={}){const device=localStorage.getItem(KEY);if(!device){setup.showModal();throw Error('Jeton requis')}const r=await fetch(API+path,{...opt,headers:{authorization:'Bearer '+device,...(opt.body?{'content-type':'application/json'}:{})},cache:'no-store'}),d=await r.json().catch(()=>({}));if(r.status===401){localStorage.removeItem(KEY);if(!setup.open)setup.showModal()}if(!r.ok)throw Error(d.error||'Erreur réseau');return d}function taskText(t){let x=labels[t.type]||t.type;if(t.type==='paddock')x+=` · ${esc(t.paddock)} ${t.startsAt}–${t.endsAt}`;if(t.description)x+=` · ${esc(t.description)}`;return x}function taskHtml(t){return `<div class="task ${t.completedAt?'done':''} ${t.requestId?'linked':''} ${busy.has(t.id)?'pending':''}" data-id="${t.id}"><strong>${taskText(t)}<\/strong>${t.requestId?'<div class="linked-label">🌿 Demande de mise au paddock<\/div>':''}<\/div>`}function render(){dayMode.classList.toggle('active',mode==='day');weekMode.classList.toggle('active',mode==='week');if(mode==='day'){const date=new Date(selected+'T12:00:00');period.textContent=date.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});const di=dayIndex();board.innerHTML=`<div class="daily">${state.horses.map(h=>{const ts=state.tasks.filter(t=>t.horseId===h.id&&t.dayIndex===di);return `<article class="horse-card"><h2>${esc(h.name)}<\/h2>${ts.length?ts.map(taskHtml).join(''):'<div class="no-task">Aucune tâche prévue<\/div>'}<\/article>`}).join('')||'<p class="empty">Aucun cheval cette semaine.<\/p>'}<\/div>`}else{period.textContent='Semaine du '+new Date(week+'T12:00:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});let html='<div class="week-grid"><div><\/div>'+days.map(d=>`<div class="head">${d}<\/div>`).join('');for(const h of state.horses){html+=`<div class="horse">${esc(h.name)}<\/div>`;for(let d=0;d<7;d++)html+=`<div class="cell">${state.tasks.filter(t=>t.horseId===h.id&&t.dayIndex===d).map(taskHtml).join('')}<\/div>`}board.innerHTML=html+'<\/div>'}board.querySelectorAll('.task:not(.done)').forEach(el=>el.onclick=()=>complete(Number(el.dataset.id)))}async function load(){try{state=await api('/api/planning?week='+week);render()}catch(e){if(e.message!=='Jeton requis')board.innerHTML=`<p class="error">${esc(e.message)}<\/p>`}}async function complete(id){if(busy.has(id)||!confirm('Valider définitivement cette tâche ?'))return;busy.add(id);render();try{const d=await api(`/api/planning/tasks/${id}/complete`,{method:'POST'});state.tasks=state.tasks.map(t=>t.id===id?d.task:t)}catch(e){alert(e.message)}finally{busy.delete(id);render()}}function move(n){if(mode==='week'){week=add(week,n*7);selected=week}else{selected=add(selected,n);const nextWeek=monday(new Date(selected+'T12:00:00'));if(nextWeek!==week){week=nextWeek;load();return}}render()}prev.onclick=()=>move(-1);next.onclick=()=>move(1);dayMode.onclick=()=>{mode='day';render()};weekMode.onclick=()=>{mode='week';render()};refresh.onclick=load
