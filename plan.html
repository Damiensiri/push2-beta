<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#287fbd">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Plan interactif</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<script src="assets/js/app-config.js?v=20260714-170000"></script>
<script src="assets/js/app-layout.js?v=20260714-170000"></script>

<link rel="stylesheet" href="assets/css/app.css?v=20260714-170000">
<link rel="stylesheet" href="assets/css/themes/summer.css?v=20260714-170000">
<link rel="stylesheet" href="assets/css/themes/autumn.css?v=20260714-170000">
<link rel="stylesheet" href="assets/css/themes/christmas.css?v=20260714-170000">
<link rel="stylesheet" href="assets/css/themes/winter.css?v=20260714-170000">
<link rel="stylesheet" href="assets/css/themes/spring.css?v=20260714-170000">
<link rel="stylesheet" href="assets/css/pages/plan.css?v=20260714-170000">
</head>

<body class="app-page">

<div class="ambient-stage" aria-hidden="true"></div>

<div class="page" id="page">

<header class="plan-header">
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>PLAN INTERACTIF</h1>
</header>

<div id="mapWrapper">

<img id="map" src="image/plan.png">

<div class="plan-btn" id="btn-carriere" onclick="openSpace('carriere')"><img id="icon-carriere"></div>
<div class="plan-btn" id="btn-beudot" onclick="openSpace('beudot')"><img id="icon-beudot"></div>
<div class="plan-btn" id="btn-manege" onclick="openSpace('manege')"><img id="icon-manege"></div>
<div class="plan-btn" id="btn-grande" onclick="openSpace('grande-voie')"><img id="icon-grande-voie"></div>
<div class="plan-btn" id="btn-maison" onclick="openSpace('maison')"><img id="icon-maison"></div>

</div>

<div class="legend">
<div class="legend-item"><img src="image/ouvert.png"> Ouvert</div>
<div class="legend-item"><img src="image/prevision.png"> Prévision d'ouverture</div>
<div class="legend-item"><img src="image/ferme.png"> Fermé</div>
<div class="legend-item"><img src="image/horsservice.png"> Hors service</div>
</div>

<div id="panel">

<div id="panelIcon">

<svg class="halo">
<circle id="haloCircle" cx="33" cy="33" r="30"/>
</svg>

<img id="panelIconImg">

</div>

<div id="panelContent">

<div id="panelHeader">
<div id="panelTitle">---</div>
<div id="closePanel">✕</div>
</div>

<div class="row">
<div class="label">Statut</div>
<div class="value" id="statut">---</div>
</div>

<div class="row">
<div class="label">Horaires</div>
<div class="value" id="horaire">---</div>
</div>

<div class="row" id="optionsRow">
<div class="label">Activités possibles</div>
<div>
<span class="optionText" id="liberte"></span>
<span class="optionText" id="longe"></span>
</div>
</div>

<div class="row">
<div class="label">Infos</div>
<div class="value scrollable" id="info"></div>
</div>

<div id="reserveBox" onclick="goReserve()">Réserver</div>

</div>

</div>

</div>

<script src="assets/js/pages/plan.js?v=20260714-170000"></script>
<script src="assets/js/status-realtime.js?v=20260714-170000"></script>

</body>
</html>
