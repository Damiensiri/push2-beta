<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Récapitulatif</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#f4f4f4;
font-family:'Montserrat',sans-serif;
}

.page{
min-height:100vh;
padding:20px;
}

header{
position:relative;
height:70px;
}

#backBtn{
position:absolute;
left:0;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.15);
cursor:pointer;
}

#backBtn img{
width:22px;
}

header h1{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
margin:0;
font-size:18px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 12px rgba(0,0,0,0.12);
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:14px;
}

.buttons{
margin-top:25px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-bottom:10px;
font-weight:600;
cursor:pointer;
}

.new{
background:#2ecc71;
color:white;
}

.done{
background:#181E3B;
color:white;
}

@media(prefers-color-scheme:dark){

body{
background:#0f1115;
color:white;
}

.card{
background:#1c1f26;
}

#backBtn{
background:#1c1f26;
}

#backBtn img{
filter:brightness(0) invert(1);
}

}

</style>
</head>

<body>

<div class="page">

<header>

<div id="backBtn" onclick="location.href='index.html'">
<img src="image/back.svg">
</div>

<h1>Récapitulatif</h1>

</header>

<div class="card" id="recap"></div>

<div class="buttons">

<button class="new" onclick="location.href='paddock.html'">
Ajouter une nouvelle réservation
</button>

<button class="done" onclick="location.href='index.html'">
Terminer
</button>

</div>

</div>

<script>

const reservation = JSON.parse(localStorage.getItem("lastReservation"))
const mise = JSON.parse(localStorage.getItem("lastMise"))

let html=""

if(reservation){

html=`

<h2>Réservation confirmée</h2>

<div class="row">
<span>Prénom</span>
<span>${reservation.name}</span>
</div>

<div class="row">
<span>Paddock</span>
<span>${reservation.paddock}</span>
</div>

<div class="row">
<span>Date</span>
<span>${reservation.date}</span>
</div>

<div class="row">
<span>Heure</span>
<span>${reservation.time}</span>
</div>

<div class="row">
<span>Durée</span>
<span>${reservation.duration} min</span>
</div>

`

localStorage.removeItem("lastReservation")

}

if(mise){

html=`

<h2>Demande mise au paddock envoyée</h2>

<div class="row">
<span>Prénom</span>
<span>${mise.name}</span>
</div>

<div class="row">
<span>Jour</span>
<span>${mise.date}</span>
</div>

<div class="row">
<span>Tarif</span>
<span>5 €</span>
</div>

`

localStorage.removeItem("lastMise")

}

document.getElementById("recap").innerHTML=html

</script>

</body>
</html>
