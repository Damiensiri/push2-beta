<body class="app-page mesreservations-page">

<div class="ambient-stage" aria-hidden="true"></div>

<div class="page" id="page">

<header class="plan-header">
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg" alt="Retour">
</div>
<h1>Mes réservations</h1>
</header>

<div class="container">

<div id="paddockCard"></div>

<div id="avenir"></div>

<div id="toggleHistory" style="margin-top:25px;font-weight:600;cursor:pointer;text-align:center;">
Voir l’historique ▼
</div>

<div id="historique" style="display:none;margin-top:15px;"></div>

</div>

</div>

<script>

/* ===== ANIMATION ===== */

window.addEventListener("DOMContentLoaded",()=>{
requestAnimationFrame(()=>{
document.getElementById("page").classList.add("active");
});
});

function goBack(){
const p=document.getElementById("page")
p.classList.remove("active")
p.classList.add("exit")
setTimeout(()=>{location.href="index.html"},300)
}

/* ===== DATE CHECK ===== */

function isPast(dateStr, timeStr="00:00"){
const dateTime=new Date(dateStr+"T"+timeStr)
return dateTime < new Date()
}

function getReservationDateTime(dateStr, timeStr="00:00"){
return new Date(dateStr+"T"+timeStr)
}

function getReservationEndDateTime(dateStr, timeStr, duration){
const start=getReservationDateTime(dateStr,timeStr)
const end=new Date(start)
end.setMinutes(end.getMinutes()+(Number(duration)||0))
return end
}

function isReservationPast(dateStr,timeStr,duration){
return getReservationEndDateTime(dateStr,timeStr,duration) <= new Date()
}

function formatDateFR(dateStr){
const date=new Date(dateStr+"T00:00")
if(isNaN(date)) return dateStr || ""
return new Intl.DateTimeFormat("fr-FR",{
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
}).format(date)
}

function formatTimeFR(value){
if(!value) return "--:--"
const parts=String(value).split(":")
return parts.slice(0,2).join("h")
}

function formatTimeRange(dateStr,timeStr,duration){
const start=formatTimeFR(timeStr)
const end=getReservationEndDateTime(dateStr,timeStr,duration)
if(isNaN(end)) return start
const endLabel=new Intl.DateTimeFormat("fr-FR",{
hour:"2-digit",
minute:"2-digit"
}).format(end).replace(":","h")
return `${start} - ${endLabel}`
}

function formatCalendarDate(date){
return date.toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,"")
}

function isIOSCalendarTarget(){
return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1)
}

const CALENDAR_ICS_URL="https://script.google.com/macros/s/AKfycbw4heNGle1tcRK6z_LIyp-aeiutj4tjP_qG3qxYxYMswgGEg9zEh8LtVgvfoNesMUwkqw/exec"

function escapeICS(value){
return String(value || "")
.replace(/\\/g,"\\\\")
.replace(/\n/g,"\\n")
.replace(/,/g,"\\,")
.replace(/;/g,"\\;")
}

async function addToCalendar(title,dateStr,timeStr,duration,description){
const start=getReservationDateTime(dateStr,timeStr)
const end=getReservationEndDateTime(dateStr,timeStr,duration)
if(isNaN(start) || isNaN(end)) return

const uid=`reservation-${Date.now()}-${Math.random().toString(36).slice(2)}@ecurie-damien-siri`
const ics=[
"BEGIN:VCALENDAR",
"VERSION:2.0",
"PRODID:-//Ecurie Damien Siri//Reservations//FR",
"CALSCALE:GREGORIAN",
"METHOD:PUBLISH",
"BEGIN:VEVENT",
`UID:${uid}`,
`DTSTAMP:${formatCalendarDate(new Date())}`,
`DTSTART:${formatCalendarDate(start)}`,
`DTEND:${formatCalendarDate(end)}`,
`SUMMARY:${escapeICS(title)}`,
`DESCRIPTION:${escapeICS(description || title)}`,
"BEGIN:VALARM",
"ACTION:DISPLAY",
"DESCRIPTION:Rappel réservation dans 45 minutes",
"TRIGGER:-PT45M",
"END:VALARM",
"BEGIN:VALARM",
"ACTION:DISPLAY",
"DESCRIPTION:Rappel fin de réservation dans 15 minutes",
"TRIGGER;RELATED=END:-PT15M",
"END:VALARM",
"END:VEVENT",
"END:VCALENDAR"
].join("\r\n")+"\r\n"

const filename=`reservation-${dateStr}.ics`

if(isIOSCalendarTarget()){
const calendarParameters=new URLSearchParams({
title:title || "Réservation paddock",
date:dateStr,
time:timeStr,
duration:String(duration),
description:description || title || "Réservation paddock"
})

window.location.href=CALENDAR_ICS_URL+"?"+calendarParameters.toString()
return
}

const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"})
const url=URL.createObjectURL(blob)
const link=document.createElement("a")
link.href=url
link.download=filename
document.body.appendChild(link)
link.click()
link.remove()
setTimeout(()=>URL.revokeObjectURL(url),1000)
}

async function addReservationToCalendar(id){
const reservation=calendarReservations[id]
if(!reservation) return
await addToCalendar(
reservation.title,
reservation.date,
reservation.time,
reservation.duration,
reservation.description
)
}

/* ===== DONNÉES BÊTA ===== */

const PADDOCK_API="https://ecurie-notifications-beta.damiensiri-pro.workers.dev"
const PADDOCK_TOKEN_KEY="ecurie_beta_session"

async function paddockApi(path,options={}){
const token=localStorage.getItem(PADDOCK_TOKEN_KEY)||""
const response=await fetch(PADDOCK_API+path,{
...options,
headers:{authorization:"Bearer "+token,...(options.body?{"content-type":"application/json"}:{})}
})
const data=await response.json().catch(()=>({}))
if(!response.ok)throw new Error(data.error||"Service paddock indisponible")
return data
}

function escapeHTML(value){
return String(value ?? "").replace(/[&<>'"]/g,char=>({
"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"
})[char])
}

/* ===== CARTE DE MISES ===== */

async function loadPaddockCard(){
const paddockCard=document.getElementById("paddockCard")
paddockCard.hidden=true
paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
<p class="card-loading">Actualisation de la carte...</p>
</div>`

try{
const account=await paddockApi("/api/paddocks/card")
const card=account.card
const invoiceUsages=(account.usages||[]).filter(item=>item.mode==="invoice")

if(!card&&!invoiceUsages.length){
paddockCard.innerHTML=""
return
}

paddockCard.hidden=false

if(!card){
paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
<p class="card-message">Aucune carte active.</p>
${invoiceUsages.length?`<p><strong>À facturer :</strong> ${invoiceUsages.map(item=>`🌿 ${formatDateFR(item.date)}`).join(" · ")}</p>`:""}
</div>`
return
}

const remaining=Math.max(0,Number(card.remaining)||0)
const total=Math.max(0,Number(card.total)||0)
const progress=total > 0 ? Math.min(100,Math.max(0,(remaining / total) * 100)) : 0
const lastCardUse=(account.usages||[]).find(item=>item.mode==="card")
const lastUse=lastCardUse?formatDateFR(lastCardUse.date):"Aucune mise enregistrée"
const progressColor=remaining >= 5 ? "progress-green" : remaining >= 2 ? "progress-orange" : "progress-red"
const remainingDisplay=remaining === 0
? '<span class="card-complete">Carte complète</span>'
: `${escapeHTML(remaining)} / ${escapeHTML(total)}`

paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
<p><strong>Mises restantes :</strong> ${remainingDisplay}</p>
<div class="progress" role="progressbar" aria-label="Mises restantes" aria-valuemin="0" aria-valuemax="${escapeHTML(total)}" aria-valuenow="${escapeHTML(remaining)}">
<div class="progress-bar ${progressColor}" style="width:${progress}%"></div>
</div>
<p><strong>Dernière mise :</strong> ${escapeHTML(lastUse)}</p>
${invoiceUsages.length?`<p><strong>À facturer :</strong> ${invoiceUsages.map(item=>`🌿 ${formatDateFR(item.date)}`).join(" · ")}</p>`:""}
</div>`
}catch(error){
console.error(error)
paddockCard.hidden=false
paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
<p class="card-message">Impossible d’actualiser la carte pour le moment.</p>
<button type="button" onclick="loadPaddockCard()">Réessayer</button>
</div>`
}
}

/* ===== LOCAL STORAGE ===== */

let calendarReservations = {}

/* ===== LOAD ===== */

async function load(){

const avenir=document.getElementById("avenir")
const historique=document.getElementById("historique")

avenir.innerHTML=""
historique.innerHTML=""

let count=0
calendarReservations={}

let reservationData=[]
let paddockRequests=[]
try{
const [reservationResponse,requestResponse]=await Promise.all([
paddockApi("/api/paddocks/reservations"),
paddockApi("/api/paddocks/requests")
])
reservationData=reservationResponse.reservations||[]
paddockRequests=requestResponse.requests||[]
}catch(error){
console.warn("Chargement des réservations impossible",error)
avenir.innerHTML='<div class="empty">Impossible de charger vos réservations.</div>'
return
}

loadPaddockCard()

reservationData.sort((a,b)=>{
const aEnd=getReservationEndDateTime(a.date,a.time,a.duration)
const bEnd=getReservationEndDateTime(b.date,b.time,b.duration)
const aPast=aEnd<=new Date()
const bPast=bEnd<=new Date()
if(aPast!==bPast) return aPast?1:-1
if(aPast) return bEnd-aEnd
return getReservationDateTime(a.date,a.time)-getReservationDateTime(b.date,b.time)
})

/* ===== RESERVATIONS ===== */

for(const data of reservationData){
const id=data.id
let old=isReservationPast(data.date,data.time,data.duration)

calendarReservations[id]={
title:`Réservation ${data.paddock || ""}`,
date:data.date,
time:data.time,
duration:Number(data.duration)||0,
description:`Réservation ${data.paddock || ""} - Écurie Damien Siri`
}

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<h3>${escapeHTML(data.paddock)}</h3>
<p><strong>Date :</strong> ${formatDateFR(data.date)}</p>
<p><strong>Horaire :</strong> ${formatTimeRange(data.date,data.time,data.duration)}</p>
<p><strong>Durée :</strong> ${escapeHTML(data.duration)} min</p>
${!old ? `<button type="button" class="calendar-btn" onclick="addReservationToCalendar('${id}')">Ajouter à mon agenda</button>` : ""}
${!old ? `<button onclick="cancelReservation('${id}')">Annuler</button>` : ""}
`

if(old){
historique.appendChild(card)
}else{
avenir.appendChild(card)
count++
}
}

/* ===== DEMANDES ===== */

for(const mise of paddockRequests){
let old=isPast(mise.date)

const statusLabels={pending:"En attente",accepted:"Accepté",refused:"Refusé",completed:"Réalisé",cancelled:"Annulé"}
const statut=statusLabels[mise.status]||"En attente"
const commentaire=mise.comment||""

let statusClass="status-attente"
if(statut==="Accepté") statusClass="status-accepte"
if(statut==="Refusé") statusClass="status-refuse"
if(statut==="Réalisé") statusClass="status-realise"
if(statut==="Annulé") statusClass="status-annule"

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<h3>Mise au paddock</h3>
<p><strong>Date :</strong> ${formatDateFR(mise.date)}</p>
<p class="status ${statusClass}">
<strong>Statut :</strong> ${escapeHTML(statut)}
</p>
${commentaire ? `<p><strong>Info :</strong> ${escapeHTML(commentaire)}</p>` : ""}
`

if(old){
historique.appendChild(card)
}else{
avenir.appendChild(card)
count++
}
}

/* ===== VIDE ===== */

if(count===0){
avenir.innerHTML='<div class="empty">Aucune réservation à venir</div>'
}

}

/* ===== ANNULATION ===== */

async function cancelReservation(id){
try{
await paddockApi("/api/paddocks/reservations/"+encodeURIComponent(id),{method:"DELETE"})
}catch(error){
alert(error.message)
return
}
load()
}

/* ===== TOGGLE ===== */

document.getElementById("toggleHistory").onclick=()=>{
const hist=document.getElementById("historique")
if(hist.style.display==="none"){
hist.style.display="block"
document.getElementById("toggleHistory").innerText="Masquer l’historique ▲"
}else{
hist.style.display="none"
document.getElementById("toggleHistory").innerText="Voir l’historique ▼"
}
}

/* ===== START ===== */

load()

setInterval(()=>{
if(!document.hidden) load()
},60000)

document.addEventListener("visibilitychange",()=>{
if(!document.hidden) load()
})

window.addEventListener("pwa-data-changed",event=>{
const type=event.detail?.type
if(type==="paddocks"||type==="paddock-requests"||type==="all")load()
else if(type==="paddock-accounts")loadPaddockCard()
})

</script>
