/* ===== DATE CHECK ===== */

function isPast(dateStr, timeStr="00:00"){
const dateTime=new Date(dateStr+"T"+timeStr)
return dateTime < new Date()
}

function getReservationDateTime(dateStr, timeStr="00:00"){
return new Date(dateStr+"T"+timeStr)
}

function getReservationEndDateTime(dateStr, timeStr, duration){
const start=getReservationDateTime(dateStr,timeStr)
const end=new Date(start)
end.setMinutes(end.getMinutes()+(Number(duration)||0))
return end
}

function formatDateFR(dateStr){
const date=new Date(dateStr+"T00:00")
if(isNaN(date)) return dateStr || ""
return new Intl.DateTimeFormat("fr-FR",{
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
}).format(date)
}

function formatTimeFR(value){
if(!value) return "--:--"
const parts=String(value).split(":")
return parts.slice(0,2).join("h")
}

function formatTimeRange(dateStr,timeStr,duration){
const start=formatTimeFR(timeStr)
const end=getReservationEndDateTime(dateStr,timeStr,duration)
if(isNaN(end)) return start
const endLabel=new Intl.DateTimeFormat("fr-FR",{
hour:"2-digit",
minute:"2-digit"
}).format(end).replace(":","h")
return `${start} - ${endLabel}`
}

function formatCalendarDate(date){
return date.toISOString().replace(/[-:]/g,"").replace(/\.\d{3}/,"")
}

function isIOSCalendarTarget(){
return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==="MacIntel" && navigator.maxTouchPoints>1)
}

function escapeICS(value){
return String(value || "")
.replace(/\\/g,"\\\\")
.replace(/\n/g,"\\n")
.replace(/,/g,"\\,")
.replace(/;/g,"\\;")
}

async function addToCalendar(title,dateStr,timeStr,duration,description){
const start=getReservationDateTime(dateStr,timeStr)
const end=getReservationEndDateTime(dateStr,timeStr,duration)
if(isNaN(start) || isNaN(end)) return

const uid=`reservation-${Date.now()}-${Math.random().toString(36).slice(2)}@ecurie-damien-siri`
const ics=[
"BEGIN:VCALENDAR",
"VERSION:2.0",
"PRODID:-//Ecurie Damien Siri//Reservations//FR",
"CALSCALE:GREGORIAN",
"METHOD:PUBLISH",
"BEGIN:VEVENT",
`UID:${uid}`,
`DTSTAMP:${formatCalendarDate(new Date())}`,
`DTSTART:${formatCalendarDate(start)}`,
`DTEND:${formatCalendarDate(end)}`,
`SUMMARY:${escapeICS(title)}`,
`DESCRIPTION:${escapeICS(description || title)}`,
"BEGIN:VALARM",
"ACTION:DISPLAY",
"DESCRIPTION:Rappel réservation dans 45 minutes",
"TRIGGER:-PT45M",
"END:VALARM",
"BEGIN:VALARM",
"ACTION:DISPLAY",
"DESCRIPTION:Rappel fin de réservation dans 15 minutes",
"TRIGGER;RELATED=END:-PT15M",
"END:VALARM",
"END:VEVENT",
"END:VCALENDAR"
].join("\r\n")+"\r\n"

const filename=`reservation-${dateStr}.ics`

if(isIOSCalendarTarget()){
window.location.href=`data:text/calendar;charset=utf-8,${encodeURIComponent(ics)}`
return
}

const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"})
const url=URL.createObjectURL(blob)
const link=document.createElement("a")
link.href=url
link.download=filename
document.body.appendChild(link)
link.click()
link.remove()
setTimeout(()=>URL.revokeObjectURL(url),1000)
}

/* ===== GOOGLE SHEETS ===== */

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRxfmZEcNesum_QBxIe2-tEihtnRSEaVC1x8Y_S3N5MEHcV4tJY3X-7i9NdTBQTBRuzDHHW9NViYrrh/pub?gid=1049919550&single=true&output=csv"
const sheetCartesURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vRxfmZEcNesum_QBxIe2-tEihtnRSEaVC1x8Y_S3N5MEHcV4tJY3X-7i9NdTBQTBRuzDHHW9NViYrrh/pub?gid=1776451835&single=true&output=csv"

async function loadSheet(){
const res=await fetch(sheetURL)
const text=await res.text()
const rows=text.split("\n").slice(1)
rows.reverse()

let demandes=[]

rows.forEach(r=>{
const c=r.split(",")
demandes.push({
nom:c[1],
date:c[2],
email:c[3],
statut:c[4],
commentaire:c[5]
})
})

return demandes
}

function parseCSV(text){
const rows=[]
let row=[]
let value=""
let quoted=false

for(let i=0;i<text.length;i++){
const char=text[i]

if(char==='"'){
if(quoted && text[i+1]==='"'){
value+='"'
i++
}else{
quoted=!quoted
}
}else if(char==="," && !quoted){
row.push(value)
value=""
}else if((char==="\n" || char==="\r") && !quoted){
if(char==="\r" && text[i+1]==="\n") i++
row.push(value)
if(row.some(cell=>cell.trim()!=="")) rows.push(row)
row=[]
value=""
}else{
value+=char
}
}

row.push(value)
if(row.some(cell=>cell.trim()!=="")) rows.push(row)
return rows
}

function normalizeHeader(value){
return value.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
}

function normalizeCardNumber(value){
return String(value || "").trim().replace(/^'+/,"").toUpperCase()
}

function escapeHTML(value){
return String(value ?? "").replace(/[&<>'"]/g,char=>({
"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"
})[char])
}

async function loadCardsSheet(){
const res=await fetch(sheetCartesURL,{cache:"no-store"})
if(!res.ok) throw new Error("Impossible de charger les cartes")

const rows=parseCSV(await res.text())
if(rows.length===0) return []

const headers=rows[0].map(normalizeHeader)
return rows.slice(1).map(row=>Object.fromEntries(
headers.map((header,index)=>[header,(row[index] || "").trim()])
))
}

</div>`

try{
const cards=await loadCardsSheet()
const card=cards.find(item=>normalizeCardNumber(item.numero)===savedNumber)

if(!card){
paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
<p><strong>Numéro :</strong> ${escapeHTML(savedNumber)}</p>
<p class="card-message">Carte introuvable. Vérifiez votre numéro ou contactez l’accueil.</p>
<button type="button" onclick="changePaddockCard()">Changer de carte</button>
</div>`
return
}

const remaining=Math.max(0,Number(String(card.restant).replace(",",".")) || 0)
const total=Math.max(0,Number(String(card.total).replace(",",".")) || 0)
const progress=total > 0 ? Math.min(100,Math.max(0,(remaining / total) * 100)) : 0
const lastUse=card.derniere_mise || "Aucune mise enregistrée"
const progressColor=remaining >= 5 ? "progress-green" : remaining >= 2 ? "progress-orange" : "progress-red"
const remainingDisplay=remaining === 0
? '<span class="card-complete">Carte complète</span>'
: `${escapeHTML(card.restant || "0")} / ${escapeHTML(card.total || "0")}`

paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
<p><strong>Numéro :</strong> ${escapeHTML(card.numero || savedNumber)}</p>
<p><strong>Mises restantes :</strong> ${remainingDisplay}</p>
<div class="progress" role="progressbar" aria-label="Mises restantes" aria-valuemin="0" aria-valuemax="${escapeHTML(total)}" aria-valuenow="${escapeHTML(remaining)}">
<div class="progress-bar ${progressColor}" style="width:${progress}%"></div>
</div>
<p><strong>Dernière mise :</strong> ${escapeHTML(lastUse)}</p>
<button type="button" onclick="changePaddockCard()">Changer de carte</button>
</div>`
}catch(error){
console.error(error)
paddockCard.innerHTML=`
<div class="card">
<h3>🐴 Ma carte de mises au paddock</h3>
<p class="card-message">Impossible d’actualiser la carte pour le moment.</p>
<button type="button" onclick="loadPaddockCard()">Réessayer</button>
<button type="button" onclick="changePaddockCard()">Changer de carte</button>
</div>`
}
}

/* ===== LOCAL STORAGE ===== */

let myReservations = JSON.parse(localStorage.getItem("myReservations") || "[]")
let myMises = JSON.parse(localStorage.getItem("myMises") || "[]")
let calendarReservations = {}

/* ===== LOAD ===== */

async function load(){

loadPaddockCard()

const avenir=document.getElementById("avenir")
const historique=document.getElementById("historique")

avenir.innerHTML=""
historique.innerHTML=""

let count=0
calendarReservations={}

/* ===== RESERVATIONS ===== */

for(const id of myReservations){

const doc=await db.collection("reservations").doc(id).get()
if(!doc.exists) continue

const data=doc.data()
let old=isPast(data.date,data.time)

calendarReservations[id]={
title:`Réservation ${data.paddock || ""}`,
date:data.date,
time:data.time,
duration:Number(data.duration)||0,
description:`Réservation ${data.paddock || ""} - Écurie Damien Siri`
}

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<h3>${escapeHTML(data.paddock)}</h3>
<p><strong>Date :</strong> ${formatDateFR(data.date)}</p>
<p><strong>Horaire :</strong> ${formatTimeRange(data.date,data.time,data.duration)}</p>
<p><strong>Durée :</strong> ${escapeHTML(data.duration)} min</p>
${!old ? `<button type="button" class="calendar-btn" onclick="addReservationToCalendar('${id}')">Ajouter à mon agenda</button>` : ""}
${!old ? `<button onclick="cancelReservation('${id}')">Annuler</button>` : ""}
`

if(old){
historique.appendChild(card)
}else{
avenir.appendChild(card)
count++
}
}

/* ===== DEMANDES ===== */

const sheetData=await loadSheet()

for(let i=myMises.length-1;i>=0;i--){

const mise=myMises[i]
let old=isPast(mise.date)

let statut="En attente"
let commentaire=""

const match=sheetData.find(d=>d.nom===mise.name && d.date===mise.date)

if(match){
statut=match.statut || "En attente"
commentaire=match.commentaire || ""
}

let statusClass="status-attente"
if(statut==="Accepté") statusClass="status-accepte"
if(statut==="Refusé") statusClass="status-refuse"
if(statut==="Réalisé") statusClass="status-realise"
if(statut==="Annulé") statusClass="status-annule"

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<h3>Mise au paddock</h3>
<p><strong>Date :</strong> ${formatDateFR(mise.date)}</p>
<p class="status ${statusClass}">
<strong>Statut :</strong> ${escapeHTML(statut)}
</p>
${commentaire ? `<p><strong>Info :</strong> ${escapeHTML(commentaire)}</p>` : ""}
`

if(old){
historique.appendChild(card)
}else{
avenir.appendChild(card)
count++
}
}

/* ===== VIDE ===== */

if(count===0){
avenir.innerHTML='<div class="empty">Aucune réservation à venir</div>'
}

}

/* ===== ANNULATION ===== */

async function cancelReservation(id){
await db.collection("reservations").doc(id).delete()
myReservations=myReservations.filter(r=>r!==id)
localStorage.setItem("myReservations",JSON.stringify(myReservations))
load()
}

/* ===== TOGGLE ===== */

document.getElementById("toggleHistory").onclick=()=>{
const hist=document.getElementById("historique")
if(hist.style.display==="none"){
hist.style.display="block"
document.getElementById("toggleHistory").innerText="Masquer l’historique ▲"
}else{
hist.style.display="none"
document.getElementById("toggleHistory").innerText="Voir l’historique ▼"
}
}

/* ===== START ===== */

load()

setInterval(()=>{load()},120000)

document.addEventListener("visibilitychange",()=>{
if(!document.hidden) load()
})

</script>

<script>
/* Identité visuelle : ambiance solaire locale, sans dépendance réseau. */
(function initializeSolarAmbiance(){
  const latitude=48.391;
  const longitude=4.527;
  const timeZone="Europe/Paris";
  const radians=Math.PI/180;
  const themeColors={
    night:"#061225",
    dawn:"#1f3155",
    morning:"#2c86c5",
    day:"#287fbd",
    golden:"#9b684f",
    dusk:"#1f3155"
  };

  function localClock(date){
    const parts={};
    new Intl.DateTimeFormat("en-CA",{
      timeZone,
      year:"numeric",
      month:"2-digit",
      day:"2-digit",
      hour:"2-digit",
      minute:"2-digit",
      hourCycle:"h23",
      timeZoneName:"shortOffset"
    }).formatToParts(date).forEach(part=>{
      if(part.type!=="literal")parts[part.type]=part.value;
    });

    const offsetMatch=(parts.timeZoneName||"GMT+1").match(/GMT([+-]?\d+(?::\d+)?)/);
    const offsetText=offsetMatch?offsetMatch[1]:"1";
    const offsetParts=offsetText.split(":");
    const offsetHours=Number(offsetParts[0])+(Number(offsetParts[1]||0)/60)*Math.sign(Number(offsetParts[0])||1);
    const dayStart=Date.UTC(Number(parts.year),Number(parts.month)-1,Number(parts.day));
    const yearStart=Date.UTC(Number(parts.year),0,1);

    return{
      minutes:Number(parts.hour)*60+Number(parts.minute),
      dayOfYear:Math.floor((dayStart-yearStart)/86400000)+1,
      offsetHours
    };
  }

  function solarTimes(clock){
    const gamma=(2*Math.PI/365)*(clock.dayOfYear-1);
    const equationOfTime=229.18*(.000075+.001868*Math.cos(gamma)-.032077*Math.sin(gamma)-.014615*Math.cos(2*gamma)-.040849*Math.sin(2*gamma));
    const declination=.006918-.399912*Math.cos(gamma)+.070257*Math.sin(gamma)-.006758*Math.cos(2*gamma)+.000907*Math.sin(2*gamma)-.002697*Math.cos(3*gamma)+.00148*Math.sin(3*gamma);
    const zenith=90.833*radians;
    const hourAngle=Math.acos((Math.cos(zenith)/(Math.cos(latitude*radians)*Math.cos(declination)))-Math.tan(latitude*radians)*Math.tan(declination));
    const solarNoon=720-4*longitude-equationOfTime+clock.offsetHours*60;
    const daylightMinutes=(hourAngle/radians)*8;

    return{
      sunrise:solarNoon-daylightMinutes/2,
      noon:solarNoon,
      sunset:solarNoon+daylightMinutes/2
    };
  }

  function phaseFor(minutes,times){
    if(minutes<times.sunrise-55||minutes>=times.sunset+50)return"night";
    if(minutes<times.sunrise+35)return"dawn";
    if(minutes<times.noon-150)return"morning";
    if(minutes<times.sunset-85)return"day";
    if(minutes<times.sunset+12)return"golden";
    return"dusk";
  }

  function updateAmbiance(){
    const now=new Date();
    const clock=localClock(now);
    const times=solarTimes(clock);
    const phase=phaseFor(clock.minutes,times);
    const daylightProgress=Math.min(1,Math.max(0,(clock.minutes-times.sunrise)/(times.sunset-times.sunrise)));
    const solarX=18+(daylightProgress*64);
    const solarY=76-(Math.sin(daylightProgress*Math.PI)*58);
    const themeMeta=document.querySelector('meta[name="theme-color"]');

    document.body.dataset.dayPhase=phase;
    document.body.style.setProperty("--solar-x",`${solarX}%`);
    document.body.style.setProperty("--solar-y",`${solarY}%`);

    if(themeMeta){
      themeMeta.setAttribute("content",themeColors[phase]||themeColors.day);
    }
  }

  updateAmbiance();
  setInterval(updateAmbiance,60000);
})();
</script>
