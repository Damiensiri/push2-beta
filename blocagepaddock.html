<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Blocage paddocks</title>

<style>
body{
font-family:Arial,sans-serif;
max-width:500px;
margin:30px auto;
padding:20px;
background:#f4f4f4;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
}

h1{
margin-top:0;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
}

.paddocks{
margin-top:10px;
}

.paddocks label{
font-weight:normal;
display:block;
margin-top:8px;
}

button{
width:100%;
margin-top:20px;
padding:14px;
border:none;
border-radius:8px;
background:#181E3B;
color:white;
font-weight:bold;
cursor:pointer;
}

#result{
margin-top:15px;
font-weight:bold;
}

.blocks-card{
margin-top:20px;
}

.blocks-card h2{
margin:0 0 15px;
font-size:20px;
}

.blocks-tabs{
display:flex;
gap:8px;
margin-bottom:15px;
}

.blocks-tabs button{
width:auto;
flex:1;
margin:0;
padding:10px;
background:#ddd;
color:#333;
}

.blocks-tabs button.active{
background:#181E3B;
color:white;
}

.block-item{
padding:14px;
margin-top:10px;
border-left:4px solid #e74c3c;
border-radius:8px;
background:#f8f8f8;
}

.block-date{
font-weight:bold;
margin-bottom:6px;
}

.block-details{
font-size:14px;
line-height:1.5;
color:#444;
}

.blocks-empty{
margin:0;
color:#777;
}

.delete-block-btn{
margin-top:10px;
padding:10px;
background:#e74c3c;
}
</style>
</head>

<body>

<div class="card">

<h1>🔥 Blocage paddocks</h1>

<label>Date</label>
<input type="date" id="date">

<label>Heure début</label>
<input type="time" id="start">

<label>Heure fin</label>
<input type="time" id="end">

<div class="paddocks">

<label>
<input type="checkbox" value="maison">
 Maison
</label>

<label>
<input type="checkbox" value="grande">
 Grande voie
</label>

<label>
<input type="checkbox" value="beudot">
 Beudot
</label>

</div>

<button onclick="createBlocks()">
Créer les blocages
</button>

<div id="result"></div>

</div>

<div class="card blocks-card">

<h2>Blocages existants</h2>

<div class="blocks-tabs">
<button id="currentBlocksTab" class="active" onclick="showBlocksTab('current')">À venir</button>
<button id="historyBlocksTab" onclick="showBlocksTab('history')">Historique</button>
</div>

<div id="blocksList">
<p class="blocks-empty">Chargement...</p>
</div>

<div id="blocksHistory" style="display:none">
<p class="blocks-empty">Chargement...</p>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyBn6Hgu-xvsWqpwJ-i4lZyI0QjKMBvOeXA",
authDomain:"ecurie-paddock.firebaseapp.com",
projectId:"ecurie-paddock",
storageBucket:"ecurie-paddock.firebasestorage.app",
messagingSenderId:"501153278739",
appId:"1:501153278739:web:824b4344c381f2a94548e6"
}

firebase.initializeApp(firebaseConfig)

const db=firebase.firestore()

async function createBlocks(){

const date=document.getElementById("date").value
const start=document.getElementById("start").value
const end=document.getElementById("end").value

if(!date || !start || !end){
alert("Complétez tous les champs")
return
}

const selected=[...document.querySelectorAll("input[type=checkbox]:checked")]

if(selected.length===0){
alert("Choisissez au moins un paddock")
return
}

const [h1,m1]=start.split(":").map(Number)
const [h2,m2]=end.split(":").map(Number)

const duration=((h2*60+m2)-(h1*60+m1))

if(duration<=0){
alert("Heure fin invalide")
return
}

let count=0

for(const paddock of selected){

await db.collection("reservations").add({

name:"BLOCAGE CANICULE",
email:"",
paddock:paddock.value,
date:date,
time:start,
duration:duration

})

count++

}

document.getElementById("result").innerHTML=
"✅ "+count+" blocage(s) créé(s)"

}

function formatBlockDate(date){

const parts=date.split("-")
const d=new Date(parts[0],parts[1]-1,parts[2])

return d.toLocaleDateString("fr-FR",{
day:"numeric",
month:"long",
year:"numeric"
})

}

function blockEndTime(time,duration){

const [h,m]=time.split(":").map(Number)
const end=(h*60)+m+duration
const endHour=Math.floor(end/60)%24
const endMinute=end%60

return String(endHour).padStart(2,"0")+":"+String(endMinute).padStart(2,"0")

}

function renderBlockList(blocks,listId,emptyMessage){

const list=document.getElementById(listId)

if(blocks.length===0){
list.innerHTML='<p class="blocks-empty">'+emptyMessage+'</p>'
return
}

const paddockNames={
maison:"Maison",
grande:"Grande voie",
beudot:"Beudot"
}

blocks.sort((a,b)=>{
const dateCompare=a.date.localeCompare(b.date)
if(dateCompare!==0) return dateCompare
return a.time.localeCompare(b.time)
})

let html=""

blocks.forEach(block=>{
html+='<div class="block-item">'
html+='<div class="block-date">'+formatBlockDate(block.date)+'</div>'
html+='<div class="block-details">'
html+='📍 '+(paddockNames[block.paddock] || block.paddock)+'<br>'
html+='⏰ '+block.time+' → '+blockEndTime(block.time,block.duration)
html+='</div>'
html+='<button class="delete-block-btn" onclick="deleteBlock(\''+block.id+'\')">Supprimer</button>'
html+='</div>'
})

list.innerHTML=html

}

let blocksCache=[]

function blockEndDate(block){

const [year,month,day]=block.date.split("-").map(Number)
const [hour,minute]=block.time.split(":").map(Number)
const end=new Date(year,month-1,day,hour,minute)

end.setMinutes(end.getMinutes()+block.duration)

return end

}

function renderBlocks(){

const now=new Date()
const currentBlocks=blocksCache.filter(block=>blockEndDate(block)>now)
const historyBlocks=blocksCache.filter(block=>blockEndDate(block)<=now)

renderBlockList(currentBlocks,"blocksList","Aucun blocage à venir.")
renderBlockList(historyBlocks,"blocksHistory","Aucun blocage dans l’historique.")

}

function showBlocksTab(tab){

const history=tab==="history"

document.getElementById("blocksList").style.display=history?"none":"block"
document.getElementById("blocksHistory").style.display=history?"block":"none"
document.getElementById("currentBlocksTab").classList.toggle("active",!history)
document.getElementById("historyBlocksTab").classList.toggle("active",history)

}

async function deleteBlock(id){

if(!confirm("Supprimer ce blocage ?")) return

await db.collection("reservations").doc(id).delete()

}

db.collection("reservations").onSnapshot(snapshot=>{

const blocks=[]

snapshot.forEach(doc=>{
const data=doc.data()

if(String(data.name || "").toUpperCase().startsWith("BLOCAGE")){
blocks.push({id:doc.id,...data})
}
})

blocksCache=blocks
renderBlocks()

})

setInterval(renderBlocks,60000)

</script>

</body>
</html>
