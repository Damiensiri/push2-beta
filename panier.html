<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Panier</title>
<meta name="theme-color" content="#287fbd">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#0f1115;
color:white;
}

/* ===== ANIMATION PAGE ===== */

.page{
min-height:100vh;
transform:translateX(100%);
transition:0.35s;
}

.page.active{
transform:translateX(0);
}

.page.exit{
transform:translateX(100%);
}

/* HEADER */

header{
position:relative;
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
font-size:20px;
}

#backBtn{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:42px;
height:42px;
border-radius:50%;
background:#1c1f26;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 8px rgba(0,0,0,0.4);
cursor:pointer;
}

#backBtn img{
width:22px;
height:22px;
filter:brightness(0) invert(1);
}

/* CONTENT */

.container{
padding:20px;
}

.item{
display:flex;
justify-content:space-between;
margin-bottom:15px;
padding:15px;
background:#1c1f26;
border-radius:12px;
}

.total{
font-size:22px;
font-weight:700;
margin-top:20px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:15px;
font-size:16px;
cursor:pointer;
}

.commander{
background:#2e43b8;
color:white;
}

.vider{
background:#444;
color:white;
}

/* Identité visuelle solaire premium. */
@property --sky-top{syntax:"<color>";inherits:true;initial-value:#287fbd;}
@property --sky-mid{syntax:"<color>";inherits:true;initial-value:#3f9fdd;}
@property --sky-bottom{syntax:"<color>";inherits:true;initial-value:#8dcced;}
@property --solar-x{syntax:"<percentage>";inherits:true;initial-value:50%;}
@property --solar-y{syntax:"<percentage>";inherits:true;initial-value:20%;}
@property --solar-opacity{syntax:"<number>";inherits:true;initial-value:.40;}

:root{
  color-scheme:light dark;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --font-main:'Montserrat',-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  --text-strong:rgba(255,255,255,.98);
  --text-main:rgba(255,255,255,.90);
  --text-soft:rgba(255,255,255,.70);
  --glass-line:rgba(255,255,255,.25);
  --glass-strong:rgba(255,255,255,.23);
  --shadow-card:0 22px 60px rgba(10,35,70,.22);
  --shadow-soft:0 12px 32px rgba(10,35,70,.16);
  --sky-top:#287fbd;
  --sky-mid:#3f9fdd;
  --sky-bottom:#8dcced;
  --solar-x:50%;
  --solar-y:20%;
  --solar-opacity:.40;
  --celestial-glow:rgba(255,241,184,.36);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  min-height:100%;
  background:#2f8fce;
}

body{
  position:relative;
  min-height:100%;
  margin:0;
  overflow-x:hidden;
  font-family:var(--font-main);
  color:var(--text-main);
  background:transparent;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  transition:--sky-top 2.8s ease,--sky-mid 2.8s ease,--sky-bottom 2.8s ease,--solar-x 60s linear,--solar-y 60s linear,--solar-opacity 2.8s ease;
}

body[data-day-phase="night"]{--sky-top:#061225;--sky-mid:#102848;--sky-bottom:#244d75;--celestial-glow:rgba(176,207,255,.26);--solar-opacity:.26;}
body[data-day-phase="dawn"]{--sky-top:#1f3155;--sky-mid:#705f84;--sky-bottom:#c88a70;--celestial-glow:rgba(255,211,164,.36);--solar-opacity:.34;}
body[data-day-phase="morning"]{--sky-top:#2c86c5;--sky-mid:#45a6e4;--sky-bottom:#9bd5f0;--celestial-glow:rgba(255,239,174,.36);--solar-opacity:.38;}
body[data-day-phase="day"]{--sky-top:#287fbd;--sky-mid:#3f9fdd;--sky-bottom:#8dcced;--celestial-glow:rgba(255,241,184,.36);--solar-opacity:.40;}
body[data-day-phase="golden"]{--sky-top:#346f9e;--sky-mid:#be7d66;--sky-bottom:#e8b681;--celestial-glow:rgba(255,210,133,.44);--solar-opacity:.44;}
body[data-day-phase="dusk"]{--sky-top:#1f3155;--sky-mid:#5f547b;--sky-bottom:#b77670;--celestial-glow:rgba(255,190,153,.30);--solar-opacity:.30;}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:radial-gradient(circle at 22% 12%,rgba(255,225,151,.22),transparent 32%),radial-gradient(circle at 84% 20%,rgba(115,224,255,.16),transparent 34%),radial-gradient(ellipse at 48% 88%,rgba(255,255,255,.10),transparent 38%),linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 48%,var(--sky-bottom) 100%);
  transform:translateZ(0);
  animation:ambientBreath 18s ease-in-out infinite alternate;
}

body::after{
  content:"";
  position:fixed;
  inset:-24%;
  z-index:0;
  pointer-events:none;
  opacity:var(--solar-opacity);
  mix-blend-mode:screen;
  background:radial-gradient(circle at var(--solar-x) var(--solar-y),var(--celestial-glow),transparent 18%),linear-gradient(112deg,transparent 0 28%,rgba(255,255,255,.14) 38%,transparent 52% 100%),radial-gradient(circle at 64% 34%,rgba(255,255,255,.18),transparent 24%);
  transform:translate3d(-5%,0,0) rotate(-3deg);
  animation:lightVeil 28s ease-in-out infinite alternate;
}

.page{
  position:relative;
  z-index:1;
  width:min(100%,520px);
  min-height:100svh;
  margin:0 auto;
  padding-bottom:calc(28px + var(--safe-bottom));
}

header{
  height:calc(70px + var(--safe-top));
  padding-top:var(--safe-top);
  background:transparent;
  color:var(--text-strong);
  font-size:16px;
  letter-spacing:.18em;
  text-transform:uppercase;
  text-shadow:0 2px 14px rgba(18,52,88,.22);
}

#backBtn{
  left:18px;
  width:44px;
  height:44px;
  border:1px solid var(--glass-line);
  background:var(--glass-strong);
  box-shadow:var(--shadow-soft),inset 0 1px 0 rgba(255,255,255,.28);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  transition:transform .22s ease,background .22s ease;
}

#backBtn:active{
  transform:translateY(-50%) scale(.93);
}

#backBtn img{
  filter:brightness(0) invert(1);
}

.container{
  padding:10px 18px 0;
}

.item{
  align-items:center;
  gap:14px;
  margin-bottom:14px;
  padding:16px;
  border:1px solid var(--glass-line);
  border-radius:24px;
  color:var(--text-main);
  background:linear-gradient(160deg,rgba(29,64,92,.78),rgba(39,93,126,.60)),radial-gradient(circle at 12% 0%,rgba(255,255,255,.18),transparent 38%);
  box-shadow:var(--shadow-card),inset 0 1px 0 rgba(255,255,255,.20);
  backdrop-filter:blur(24px) saturate(145%);
  -webkit-backdrop-filter:blur(24px) saturate(145%);
}

.item > div:first-child{
  font-weight:800;
}

.item > div:last-child{
  color:var(--text-strong);
  font-weight:800;
}

.total{
  margin:20px 0 8px;
  padding:18px;
  border:1px solid var(--glass-line);
  border-radius:24px;
  color:var(--text-strong);
  background:rgba(255,255,255,.14);
  box-shadow:var(--shadow-soft),inset 0 1px 0 rgba(255,255,255,.16);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
}

button{
  min-height:52px;
  border:1px solid rgba(255,255,255,.22);
  border-radius:18px;
  color:white;
  font-family:var(--font-main);
  font-weight:800;
  box-shadow:0 14px 28px rgba(10,35,70,.18),inset 0 1px 0 rgba(255,255,255,.24);
  transition:transform .18s ease,box-shadow .18s ease;
}

button:active{
  transform:scale(.98);
}

.commander{
  background:linear-gradient(135deg,#4cc3ff,#277fc1);
}

.vider{
  background:linear-gradient(135deg,#e65a4f,#c93b36);
}

@keyframes ambientBreath{from{filter:saturate(.96) brightness(.99);}to{filter:saturate(1.07) brightness(1.03);}}
@keyframes lightVeil{from{transform:translate3d(-5%,0,0) rotate(-3deg);}to{transform:translate3d(5%,2%,0) rotate(2deg);}}

@media(prefers-color-scheme:dark){
  :root{
    --glass-strong:rgba(24,36,58,.46);
    --glass-line:rgba(255,255,255,.16);
    --shadow-card:0 24px 70px rgba(0,0,0,.34);
    --shadow-soft:0 14px 36px rgba(0,0,0,.26);
  }
}

@media(prefers-reduced-motion:reduce){
  *,
  *::before,
  *::after{
    animation-duration:1ms!important;
    animation-iteration-count:1!important;
    transition-duration:1ms!important;
  }
}

</style>
<link rel="stylesheet" href="app-shell.css">
</head>

<body class="fullscreen-standard">

<div class="ambient-stage" aria-hidden="true"></div>

<div class="page" id="page">

<header class="plan-header">

<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>

<h1>Panier</h1>

</header>

<div class="container">

<div id="cartList"></div>

<div class="total">
Total : <span id="total">0</span> €
</div>

<button class="commander" onclick="commander()">
Commander
</button>

<button class="vider" onclick="vider()">
Vider le panier
</button>

</div>

</div>

<script>

/* ===== ANIMATION OUVERTURE ===== */

window.addEventListener("DOMContentLoaded",()=>{
requestAnimationFrame(()=>{
document.getElementById("page").classList.add("active");
});
});

/* ===== ANIMATION FERMETURE ===== */

function goBack(){

const p=document.getElementById("page")

p.classList.remove("active")
p.classList.add("exit")

setTimeout(()=>{
location.href="index.html"
},300)

}

/* EMAILJS */

(function(){
emailjs.init("03cdce-AcdCC03k_v");
})();

/* PANIER */

let cart = JSON.parse(localStorage.getItem("cart") || "[]")

function render(){

let html=""
let total=0

cart.forEach(item=>{

html+=`
<div class="item">
<div>${item.name} x${item.qty}</div>
<div>${item.price*item.qty} €</div>
</div>
`

total+=item.price*item.qty

})

document.getElementById("cartList").innerHTML=html
document.getElementById("total").innerText=total

}

render()

/* VIDER PANIER */

function vider(){

localStorage.removeItem("cart")
cart=[]
render()

}

/* COMMANDER */

function commander(){

if(cart.length===0){
alert("Panier vide")
return
}

let nom = prompt("Votre nom")
let prenom = prompt("Votre prénom")
let email = prompt("Votre email")

if(!nom || !prenom || !email){
alert("Informations manquantes")
return
}

let total=0
let commandeHTML=""

cart.forEach(item=>{

let lineTotal=item.price*item.qty

commandeHTML+=`
<tr>
<td>${item.name}</td>
<td align="center">${item.qty}</td>
<td align="right">${lineTotal} €</td>
</tr>
`

total+=lineTotal

})

emailjs.send("service_mkpsbdf","template_ftv15rb",{

nom:nom,
prenom:prenom,
email:email,
commande:commandeHTML,
total:total

})

.then(()=>{

let orders = JSON.parse(localStorage.getItem("orders") || "[]")

orders.push({
date:new Date().toLocaleString(),
items:cart,
total:total
})

localStorage.setItem("orders", JSON.stringify(orders))
localStorage.setItem("lastOrder", JSON.stringify({items:cart,total:total}))

localStorage.removeItem("cart")

window.location.href="confirmation.html"

})

.catch(()=>{
alert("Erreur envoi email")
})

}

</script>

<script>
/* Identité visuelle : ambiance solaire locale, sans dépendance réseau. */
(function initializeSolarAmbiance(){
  const latitude=48.391;
  const longitude=4.527;
  const timeZone="Europe/Paris";
  const radians=Math.PI/180;
  const themeColors={
    night:"#061225",
    dawn:"#1f3155",
    morning:"#2c86c5",
    day:"#287fbd",
    golden:"#9b684f",
    dusk:"#1f3155"
  };

  function localClock(date){
    const parts={};
    new Intl.DateTimeFormat("en-CA",{
      timeZone,
      year:"numeric",
      month:"2-digit",
      day:"2-digit",
      hour:"2-digit",
      minute:"2-digit",
      hourCycle:"h23",
      timeZoneName:"shortOffset"
    }).formatToParts(date).forEach(part=>{
      if(part.type!=="literal")parts[part.type]=part.value;
    });

    const offsetMatch=(parts.timeZoneName||"GMT+1").match(/GMT([+-]?\d+(?::\d+)?)/);
    const offsetText=offsetMatch?offsetMatch[1]:"1";
    const offsetParts=offsetText.split(":");
    const offsetHours=Number(offsetParts[0])+(Number(offsetParts[1]||0)/60)*Math.sign(Number(offsetParts[0])||1);
    const dayStart=Date.UTC(Number(parts.year),Number(parts.month)-1,Number(parts.day));
    const yearStart=Date.UTC(Number(parts.year),0,1);

    return{
      minutes:Number(parts.hour)*60+Number(parts.minute),
      dayOfYear:Math.floor((dayStart-yearStart)/86400000)+1,
      offsetHours
    };
  }

  function solarTimes(clock){
    const gamma=(2*Math.PI/365)*(clock.dayOfYear-1);
    const equationOfTime=229.18*(.000075+.001868*Math.cos(gamma)-.032077*Math.sin(gamma)-.014615*Math.cos(2*gamma)-.040849*Math.sin(2*gamma));
    const declination=.006918-.399912*Math.cos(gamma)+.070257*Math.sin(gamma)-.006758*Math.cos(2*gamma)+.000907*Math.sin(2*gamma)-.002697*Math.cos(3*gamma)+.00148*Math.sin(3*gamma);
    const zenith=90.833*radians;
    const hourAngle=Math.acos((Math.cos(zenith)/(Math.cos(latitude*radians)*Math.cos(declination)))-Math.tan(latitude*radians)*Math.tan(declination));
    const solarNoon=720-4*longitude-equationOfTime+clock.offsetHours*60;
    const daylightMinutes=(hourAngle/radians)*8;

    return{
      sunrise:solarNoon-daylightMinutes/2,
      noon:solarNoon,
      sunset:solarNoon+daylightMinutes/2
    };
  }

  function phaseFor(minutes,times){
    if(minutes<times.sunrise-55||minutes>=times.sunset+50)return"night";
    if(minutes<times.sunrise+35)return"dawn";
    if(minutes<times.noon-150)return"morning";
    if(minutes<times.sunset-85)return"day";
    if(minutes<times.sunset+12)return"golden";
    return"dusk";
  }

  function updateAmbiance(){
    const now=new Date();
    const clock=localClock(now);
    const times=solarTimes(clock);
    const phase=phaseFor(clock.minutes,times);
    const daylightProgress=Math.min(1,Math.max(0,(clock.minutes-times.sunrise)/(times.sunset-times.sunrise)));
    const solarX=18+(daylightProgress*64);
    const solarY=76-(Math.sin(daylightProgress*Math.PI)*58);
    const themeMeta=document.querySelector('meta[name="theme-color"]');

    document.body.dataset.dayPhase=phase;
    document.body.style.setProperty("--solar-x",`${solarX}%`);
    document.body.style.setProperty("--solar-y",`${solarY}%`);

    if(themeMeta){
      themeMeta.setAttribute("content",themeColors[phase]||themeColors.day);
    }
  }

  updateAmbiance();
  setInterval(updateAmbiance,60000);
})();
</script>
