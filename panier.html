<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Panier</title>
<meta name="theme-color" content="#287fbd">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<script src="assets/js/app-config.js?v=20260709-201655"></script>
<script src="assets/js/app-layout.js?v=20260709-201655"></script>

<link rel="stylesheet" href="assets/css/app.css?v=20260709-201655">
<link rel="stylesheet" href="assets/css/themes/summer.css?v=20260709-201655">
<link rel="stylesheet" href="assets/css/themes/autumn.css?v=20260709-201655">
<link rel="stylesheet" href="assets/css/themes/christmas.css?v=20260709-201655">
<link rel="stylesheet" href="assets/css/themes/winter.css?v=20260709-201655">
<link rel="stylesheet" href="assets/css/themes/spring.css?v=20260709-201655">
<link rel="stylesheet" href="assets/css/pages/panier.css?v=20260709-201655">
</head>

<body class="app-page">

<div class="ambient-stage" aria-hidden="true"></div>

<div class="page" id="page">

<header class="plan-header">
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>Panier</h1>
</header>

<div class="container">

<div id="cartList"></div>

<div class="total">
Total : <span id="total">0</span> €
</div>

<form id="checkoutForm" class="customer-form">

<div class="form-field">
<label for="clientNom">Nom</label>
<input
  id="clientNom"
  name="nom"
  type="text"
  autocomplete="family-name"
  placeholder="Votre nom"
  required
>
</div>

<div class="form-field">
<label for="clientPrenom">Prénom</label>
<input
  id="clientPrenom"
  name="prenom"
  type="text"
  autocomplete="given-name"
  placeholder="Votre prénom"
  required
>
</div>

<div class="form-field">
<label for="clientEmail">Email</label>
<input
  id="clientEmail"
  name="email"
  type="email"
  autocomplete="email"
  inputmode="email"
  placeholder="votre@email.fr"
  required
>
</div>

<button id="commanderBtn" class="commander" type="submit" disabled>
Commander
</button>

</form>

<button class="vider" type="button" onclick="vider()">
Vider le panier
</button>

</div>

</div>

<script src="assets/js/profile-store.js?v=20260709-201655"></script>
<script src="assets/js/pages/service-profile.js?v=20260709-201655"></script>
<script src="assets/js/app-mailer.js?v=20260709-201655"></script>
<script src="assets/js/pages/panier.js?v=20260709-201655"></script>

</body>
</html>
