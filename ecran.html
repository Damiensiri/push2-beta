    <main class="screen">

    <div class="hint">
      Double toucher : planning
    </div><script type="text/javascript">
const API='https://ecurie-notifications-beta.damiensiri-pro.workers.dev',ORDER=['carriere','manege','maison','grande-voie','beudot'],WORK=['carriere','manege'],PADDOCKS=['maison','grande-voie','beudot'],NAMES={carriere:'Carrière',manege:'Manège',maison:'Maison','grande-voie':'Grande voie',beudot:'Beudot'};let last='';const $=id=>document.getElementById(id);function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'})[c])}function label(s){return s==='ouvert'?'Ouvert':s==='ferme'?'Fermé':s==='prevision'?'Prévu':s==='hors-service'?'H. service':''}function cls(s){return s==='ouvert'?'open':s==='ferme'?'closed':s==='prevision'?'prevision':s==='hors-service'?'hors-service':''}function yn(v){return v?`<span class="yn ${v==='oui'?'yes':'no'}">${v==='oui'?'OUI':'NON'}<\/span>`:''}function card(row){const work=WORK.includes(row.espace),hours=row.horaire_special||row.horaire_affiche||'',c=cls(row.statut_auto);return `<div class="top"><div class="name"><img src="image/${work?'travail':'paddock'}.svg" alt=""><span>${esc(NAMES[row.espace]||row.espace)}<\/span><\/div><span class="state ${c}">${label(row.statut_auto)}<\/span><\/div><div class="middle">${work?`<div class="metric">Liberté ${yn(row.liberte)}<\/div><div class="metric">Longe ${yn(row.longe)}<\/div>`:''}<div class="hours ${row.horaire_special?'special':''}">${esc(hours)}<\/div><\/div><div class="info">${esc(row.info||'')}<\/div>`}function iso(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}function stable(data,schedules,exceptions){const exception=exceptions.find(x=>String(x.date).slice(0,10)===iso()&&x.message),day=new Date().toLocaleDateString('fr-FR',{weekday:'long'}).toLowerCase(),schedule=schedules.find(x=>String(x.jour).toLowerCase()===day),hours=exception?.message||(schedule?`${schedule.ouvert} - ${schedule.ferme}`:'Horaires non définis'),home=data.find(x=>x.espace==='accueil'),alert=home?.alerte||'',urgent=String(home?.urgent).toLowerCase()==='oui';return `<div class="top"><div class="name"><img src="image/time.svg" alt=""><span>Horaires Écurie<\/span><\/div><strong>Aujourd’hui<\/strong><\/div><div class="stable-main"><div class="stable-time">${esc(hours)}<\/div><div class="stable-source">${exception?'Horaires adaptés':'Horaires habituels'}<\/div><div class="alert ${alert?'has':''} ${urgent?'urgent':''}">${alert?`<strong>Alerte :<\/strong> ${esc(alert)}`:'Aucune alerte'}<\/div><\/div>`}function render(data,schedules,exceptions){const key=JSON.stringify([data,schedules,exceptions]);if(key===last)return;last=key;for(const id of ORDER){const row=data.find(x=>x.espace===id),el=$(id);if(!row)continue;el.className='card '+cls(row.statut_auto);el.innerHTML=card(row)}$('stable').innerHTML=stable(data,schedules,exceptions);$('workMeta').textContent=`${WORK.filter(id=>data.find(x=>x.espace===id)?.statut_auto==='ouvert').length}/2 ouverts`;$('paddockMeta').textContent=`${PADDOCKS.filter(id=>data.find(x=>x.espace===id)?.statut_auto==='ouvert').length}/3 ouverts`}async function load(){try{const [a,b,c]=await Promise.all(['/api/statuses','/api/schedules','/api/exceptions'].map(path=>fetch(API+path,{cache:'no-store'}).then(r=>{if(!r.ok)throw Error();return r.json()})));render(a,b,c)}catch(e){$('date').textContent='Connexion aux données en attente'}}function tick(){const d=new Date();$('clock').textContent=d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});$('date').textContent=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}let tap=0;document.addEventListener('pointerup',()=>{const now=Date.now();if(now-tap<400)location.href='planning.html';tap=now});tick();setInterval(tick,1000);load();setInterval(load,60000);try{const ws=new WebSocket(API.replace('https','wss')+'/api/realtime');ws.onmessage=()=>load()}catch{}
    </script>
