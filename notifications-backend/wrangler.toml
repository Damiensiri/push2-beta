name = "ecurie-notifications-beta"
main = "src/worker.js"
compatibility_date = "2026-07-14"

[vars]
ENVIRONMENT = "beta"
PUSH_ENABLED = "true"
ONESIGNAL_APP_ID = "186e6f3b-def4-4b8e-8700-650456ff93cc"
ALLOWED_ORIGIN = "https://damiensiri.github.io,http://127.0.0.1:8000"
MAILER_ENDPOINT = "https://script.google.com/macros/s/AKfycbx278-X4lrLlua_Jns-UfO04PDWDhk7qOTnsF2BW_VuMjgNnlHIxvsW9fk35HI6nJl-eQ/exec"

[triggers]
crons = ["* * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "ecurie-notifications-beta"
database_id = "c88d9f28-f645-4c61-abd2-3ddebcbc0cab"

[[r2_buckets]]
binding = "PRODUCT_IMAGES"
bucket_name = "ecurie-products-beta"

[[durable_objects.bindings]]
name = "REALTIME_HUB"
class_name = "RealtimeHub"

[[migrations]]
tag = "v1-realtime"
new_sqlite_classes = ["RealtimeHub"]
