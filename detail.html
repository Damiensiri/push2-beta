<!DOCTYPE html>
<html lang="fr" class="safe-area-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Détail alerte</title>
<meta name="theme-color" content="#287fbd">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

body{
  margin:0;
  font-family:'Montserrat',sans-serif;
  background:#f4f4f4;
  color:#000;
  transition:background .3s ease,color .3s ease;
}

/* ================= HEADER ================= */

header{
  position:relative;
  background:#f4f4f4;
  padding:15px 12px;
  height:70px;
  transition:background .3s ease;
}

#backBtn{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  width:36px;
  height:36px;
  border-radius:50%;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
  cursor:pointer;
}

#backBtn img{
  width:18px;
  height:18px;
}

header h1{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  margin:0;
  font-size:20px;
  font-weight:700;
  color:#181E3B;
  white-space:nowrap;
}

/* ================= LOADER ================= */

#loader{
  position:fixed;
  inset:0;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.spinner{
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #1f5c8f;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* ================= CARD ================= */

.card{
  background:white;
  margin:15px;
  padding:20px;
  border-radius:12px;
  box-shadow:0 3px 8px rgba(0,0,0,0.08);
  transition:background .3s ease, box-shadow .3s ease;
}

.titre{
  font-size:22px;
  font-weight:700;
  color:#1f5c8f;
  margin-bottom:6px;
}

.categorie{
  font-size:14px;
  color:#888;
  margin-bottom:6px;
}

.heure{
  font-size:15px;
  font-weight:bold;
  color:red;
  margin-bottom:15px;
}

.message{
  font-size:16px;
  line-height:1.6;
  white-space:pre-line;
}

/* ================= DARK MODE ================= */

@media (prefers-color-scheme: dark){

  body{
    background:#0f1115;
    color:#ffffff;
  }

  header{
    background:#0f1115;
  }

  header h1{
    color:#ffffff;
  }

  #backBtn{
    background:#1c1f26;
    box-shadow:0 10px 25px rgba(0,0,0,0.6);
  }

  #backBtn img{
    filter:brightness(0) invert(1);
  }

  #loader{
    background:#0f1115;
  }

  .card{
    background:#1c1f26;
    box-shadow:0 20px 50px rgba(0,0,0,0.75);
  }

  .titre{
    color:#5da9ff;
  }

  .categorie{
    color:#aaaaaa;
  }

}

</style>

<style>
/* Identité visuelle solaire premium. */
@property --sky-top{syntax:"<color>";inherits:true;initial-value:#287fbd;}
@property --sky-mid{syntax:"<color>";inherits:true;initial-value:#3f9fdd;}
@property --sky-bottom{syntax:"<color>";inherits:true;initial-value:#8dcced;}
@property --solar-x{syntax:"<percentage>";inherits:true;initial-value:50%;}
@property --solar-y{syntax:"<percentage>";inherits:true;initial-value:20%;}
@property --solar-opacity{syntax:"<number>";inherits:true;initial-value:.40;}

:root{
  color-scheme:light dark;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --font-main:'Montserrat',-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  --text-strong:rgba(255,255,255,.98);
  --text-main:rgba(255,255,255,.90);
  --text-soft:rgba(255,255,255,.70);
  --card-border:rgba(255,255,255,.25);
  --btn-bg:rgba(255,255,255,.18);
  --shadow-card:0 22px 60px rgba(10,35,70,.22);
  --shadow-soft:0 12px 32px rgba(10,35,70,.16);
  --sky-top:#287fbd;
  --sky-mid:#3f9fdd;
  --sky-bottom:#8dcced;
  --solar-x:50%;
  --solar-y:20%;
  --solar-opacity:.40;
  --celestial-glow:rgba(255,241,184,.36);
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  min-height:100%;
  background:#2f8fce;
}

body{
  position:relative;
  min-height:100%;
  margin:0;
  overflow-x:hidden;
  font-family:var(--font-main);
  color:var(--text-main);
  background:transparent;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  transition:--sky-top 2.8s ease,--sky-mid 2.8s ease,--sky-bottom 2.8s ease,--solar-x 60s linear,--solar-y 60s linear,--solar-opacity 2.8s ease;
}

body[data-day-phase="night"]{--sky-top:#061225;--sky-mid:#102848;--sky-bottom:#244d75;--celestial-glow:rgba(176,207,255,.26);--solar-opacity:.26;}
body[data-day-phase="dawn"]{--sky-top:#1f3155;--sky-mid:#705f84;--sky-bottom:#c88a70;--celestial-glow:rgba(255,211,164,.36);--solar-opacity:.34;}
body[data-day-phase="morning"]{--sky-top:#2c86c5;--sky-mid:#45a6e4;--sky-bottom:#9bd5f0;--celestial-glow:rgba(255,239,174,.36);--solar-opacity:.38;}
body[data-day-phase="day"]{--sky-top:#287fbd;--sky-mid:#3f9fdd;--sky-bottom:#8dcced;--celestial-glow:rgba(255,241,184,.36);--solar-opacity:.40;}
body[data-day-phase="golden"]{--sky-top:#346f9e;--sky-mid:#be7d66;--sky-bottom:#e8b681;--celestial-glow:rgba(255,210,133,.44);--solar-opacity:.44;}
body[data-day-phase="dusk"]{--sky-top:#1f3155;--sky-mid:#5f547b;--sky-bottom:#b77670;--celestial-glow:rgba(255,190,153,.30);--solar-opacity:.30;}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
  background:radial-gradient(circle at 22% 12%,rgba(255,225,151,.22),transparent 32%),radial-gradient(circle at 84% 20%,rgba(115,224,255,.16),transparent 34%),radial-gradient(ellipse at 48% 88%,rgba(255,255,255,.10),transparent 38%),linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 48%,var(--sky-bottom) 100%);
  transform:translateZ(0);
  animation:ambientBreath 18s ease-in-out infinite alternate;
}

body::after{
  content:"";
  position:fixed;
  inset:-24%;
  z-index:0;
  pointer-events:none;
  opacity:var(--solar-opacity);
  mix-blend-mode:screen;
  background:radial-gradient(circle at var(--solar-x) var(--solar-y),var(--celestial-glow),transparent 18%),linear-gradient(112deg,transparent 0 28%,rgba(255,255,255,.14) 38%,transparent 52% 100%),radial-gradient(circle at 64% 34%,rgba(255,255,255,.18),transparent 24%);
  transform:translate3d(-5%,0,0) rotate(-3deg);
  animation:lightVeil 28s ease-in-out infinite alternate;
}

header,
#content{
  position:relative;
  z-index:1;
  width:min(100%,520px);
  margin-left:auto;
  margin-right:auto;
}

header{
  height:calc(70px + var(--safe-top));
  padding:var(--safe-top) 12px 0;
  background:transparent;
}

#backBtn{
  left:18px;
  width:44px;
  height:44px;
  border:1px solid var(--card-border);
  background:var(--btn-bg);
  box-shadow:var(--shadow-soft),inset 0 1px 0 rgba(255,255,255,.28);
  backdrop-filter:blur(18px) saturate(140%);
  -webkit-backdrop-filter:blur(18px) saturate(140%);
  transition:transform .22s ease,background .22s ease;
}

#backBtn:active{
  transform:translateY(-50%) scale(.93);
}

#backBtn img{
  width:22px;
  height:22px;
  filter:brightness(0) invert(1);
}

header h1{
  color:var(--text-strong);
  font-size:16px;
  letter-spacing:.18em;
  text-shadow:0 2px 14px rgba(18,52,88,.22);
}

#loader{
  background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 48%,var(--sky-bottom) 100%);
}

.spinner{
  border-color:rgba(255,255,255,.22);
  border-top-color:#ffb23f;
}

#content{
  padding-bottom:calc(28px + var(--safe-bottom));
}

.card{
  position:relative;
  overflow:hidden;
  margin:0 18px 18px;
  padding:20px;
  border:1px solid var(--card-border);
  border-radius:28px;
  color:var(--text-main);
  background:linear-gradient(160deg,rgba(29,64,92,.80),rgba(39,93,126,.64)),radial-gradient(circle at 12% 0%,rgba(255,255,255,.18),transparent 38%);
  box-shadow:var(--shadow-card),inset 0 1px 0 rgba(255,255,255,.20);
  backdrop-filter:blur(24px) saturate(145%);
  -webkit-backdrop-filter:blur(24px) saturate(145%);
  animation:cardReveal .72s cubic-bezier(.2,.85,.24,1) both;
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(180deg,rgba(255,255,255,.10),transparent 52%);
}

.card > *{
  position:relative;
  z-index:1;
}

.titre{
  color:var(--text-strong);
  font-size:22px;
  line-height:1.3;
  text-shadow:0 2px 14px rgba(0,0,0,.16);
}

.categorie{
  color:rgba(255,255,255,.68);
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.heure{
  width:max-content;
  margin:10px 0 16px;
  padding:6px 10px;
  border:1px solid rgba(255,178,63,.28);
  border-radius:999px;
  color:#ffb23f;
  background:rgba(255,178,63,.12);
  font-size:12px;
  font-weight:800;
  text-shadow:0 1px 10px rgba(0,0,0,.18);
}

.heure:empty{
  display:none;
}

.message{
  color:rgba(255,255,255,.92);
  line-height:1.72;
  text-shadow:0 1px 10px rgba(0,0,0,.12);
}

.message a{
  color:#ffcf7a;
  font-weight:700;
}

.message p{
  margin:0 0 1em;
}

.message p:last-child{
  margin-bottom:0;
}

.message ul,
.message ol{
  padding-left:1.2em;
}

@keyframes ambientBreath{from{filter:saturate(.96) brightness(.99);}to{filter:saturate(1.07) brightness(1.03);}}
@keyframes lightVeil{from{transform:translate3d(-5%,0,0) rotate(-3deg);}to{transform:translate3d(5%,2%,0) rotate(2deg);}}
@keyframes cardReveal{from{opacity:0;transform:translate3d(0,12px,0);}to{opacity:1;transform:none;}}

@media (prefers-color-scheme:dark){
  :root{
    --card-border:rgba(255,255,255,.16);
    --btn-bg:rgba(24,36,58,.46);
    --shadow-card:0 24px 70px rgba(0,0,0,.34);
    --shadow-soft:0 14px 36px rgba(0,0,0,.26);
  }
}

@media (prefers-reduced-motion:reduce){
  *,
  *::before,
  *::after{
    animation-duration:1ms !important;
    animation-iteration-count:1 !important;
    transition-duration:1ms !important;
  }
}

<body class="fullscreen-standard safe-area-extended">

<div class="ambient-stage" aria-hidden="true"></div>

<header class="plan-header">
  <div id="backBtn" onclick="goBack()">
    <img src="image/back.svg">
  </div>
  <h1>ALERTE</h1>
</header>

<div id="loader"><div class="spinner"></div></div>

<div id="content" style="display:none;">
  <div class="card">
    <div class="titre" id="titre"></div>
    <div class="categorie" id="categorie"></div>
    <div class="heure" id="heure"></div>
    <div class="message" id="message"></div>
  </div>
</div>

<script>

/* Chargement du détail de l’alerte. */

const API_URL="https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrRY09nECq5kqJEPaFCkMRnR4qbM-Z9y5KOMgVdlakJAA_L1FlwHMDN84Nstw8qXhqpt9QHGCeU6Sr6aLk3y7hSeA-1vr_eBBQYFwVL111h-CJZc8JxRQKvcu3XE7Gg-OXbXE8Vkp1PlAMHAkhJduQw6bxUswIvR7b1rA8txQ2Rtyl25eNxQWvtBet3bytcH6RpMKvJdyZcSioOtKa5sYL4uRI4FOoFrfUzX5P_pjpK-cAN8Bdf6otVcK4myQl66GohjWiPVOyCuofXOq8M4lQkmsxucwQ&lib=MfQh9XKIUpdlMRcOJ4l9JImAGFOlNCMp3";

const STORAGE_KEY="alerts_lues";

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

function parseDateFR(str){
  if(!str) return null;

  if(str.includes("T")){
    const d=new Date(str);
    d.setHours(0,0,0,0);
    return d;
  }

  if(str.includes("-")){
    const p=str.split("-");
    return new Date(p[0],p[1]-1,p[2],0,0,0);
  }

  if(str.includes("/")){
    const p=str.split("/");
    return new Date(p[2],p[1]-1,p[0],0,0,0);
  }

  return null;
}

function marquerLu(id){
  const lues=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
  if(!lues.includes(id)){
    lues.push(id);
    localStorage.setItem(STORAGE_KEY,JSON.stringify(lues));
  }
}

async function loadDetail(){

  try{

    let cachedNotif=null;
    try{
      const cached=JSON.parse(sessionStorage.getItem("alert_detail_cache")||"null");
      if(cached&&String(cached.id)===String(id)) cachedNotif=cached;
    }catch(e){}

    let data=[];
    try{
      const res=await fetch(API_URL);
      data=await res.json();
    }catch(fetchError){
      if(cachedNotif) data=[cachedNotif];
      else throw fetchError;
    }

    const notif=data.find(n=>String(n.id)===String(id))||cachedNotif;

    if(!notif){
      document.getElementById("titre").innerText="Notification introuvable";
    }
    else{

      const today=new Date();
      today.setHours(0,0,0,0);

      const expireDate=parseDateFR(notif.expire);

      const autorisee =
        notif.active==="oui" &&
        (
          notif.epingle==="oui" ||
          !expireDate ||
          expireDate>=today
        );

      if(!autorisee){
        document.getElementById("titre").innerText=
          "Cette notification n’est plus disponible.";
      }
      else{

        marquerLu(notif.id);

        document.getElementById("titre").innerText=notif.titre;
        document.getElementById("categorie").innerText=notif.categorie||"";
        document.getElementById("heure").innerText=notif.heure||"";
        document.getElementById("message").innerHTML=notif.message||"";
      }
    }

  }catch(e){
    console.log("Erreur :",e);
  }

  document.getElementById("loader").style.display="none";
  document.getElementById("content").style.display="block";
}

function goBack(){
  window.history.back();
}

loadDetail();

</script>

<script>
/* Identité visuelle : ambiance solaire locale, sans dépendance réseau. */
(function initializeSolarAmbiance(){
  const latitude=48.391;
  const longitude=4.527;
  const timeZone="Europe/Paris";
  const radians=Math.PI/180;
  const themeColors={
    night:"#061225",
    dawn:"#1f3155",
    morning:"#2c86c5",
    day:"#287fbd",
    golden:"#9b684f",
    dusk:"#1f3155"
  };

  function localClock(date){
    const parts={};
    new Intl.DateTimeFormat("en-CA",{
      timeZone,
      year:"numeric",
      month:"2-digit",
      day:"2-digit",
      hour:"2-digit",
      minute:"2-digit",
      hourCycle:"h23",
      timeZoneName:"shortOffset"
    }).formatToParts(date).forEach(part=>{
      if(part.type!=="literal")parts[part.type]=part.value;
    });

    const offsetMatch=(parts.timeZoneName||"GMT+1").match(/GMT([+-]?\d+(?::\d+)?)/);
    const offsetText=offsetMatch?offsetMatch[1]:"1";
    const offsetParts=offsetText.split(":");
    const offsetHours=Number(offsetParts[0])+(Number(offsetParts[1]||0)/60)*Math.sign(Number(offsetParts[0])||1);
    const dayStart=Date.UTC(Number(parts.year),Number(parts.month)-1,Number(parts.day));
    const yearStart=Date.UTC(Number(parts.year),0,1);

    return{
      minutes:Number(parts.hour)*60+Number(parts.minute),
      dayOfYear:Math.floor((dayStart-yearStart)/86400000)+1,
      offsetHours
    };
  }

  function solarTimes(clock){
    const gamma=(2*Math.PI/365)*(clock.dayOfYear-1);
    const equationOfTime=229.18*(.000075+.001868*Math.cos(gamma)-.032077*Math.sin(gamma)-.014615*Math.cos(2*gamma)-.040849*Math.sin(2*gamma));
    const declination=.006918-.399912*Math.cos(gamma)+.070257*Math.sin(gamma)-.006758*Math.cos(2*gamma)+.000907*Math.sin(2*gamma)-.002697*Math.cos(3*gamma)+.00148*Math.sin(3*gamma);
    const zenith=90.833*radians;
    const hourAngle=Math.acos((Math.cos(zenith)/(Math.cos(latitude*radians)*Math.cos(declination)))-Math.tan(latitude*radians)*Math.tan(declination));
    const solarNoon=720-4*longitude-equationOfTime+clock.offsetHours*60;
    const daylightMinutes=(hourAngle/radians)*8;

    return{
      sunrise:solarNoon-daylightMinutes/2,
      noon:solarNoon,
      sunset:solarNoon+daylightMinutes/2
    };
  }

  function phaseFor(minutes,times){
    if(minutes<times.sunrise-55||minutes>=times.sunset+50)return"night";
    if(minutes<times.sunrise+35)return"dawn";
    if(minutes<times.noon-80)return"morning";
    if(minutes<times.sunset-115)return"day";
    if(minutes<times.sunset-25)return"golden";
    return"dusk";
  }

  function updateAmbiance(){
    const clock=localClock(new Date());
    const times=solarTimes(clock);
    const phase=phaseFor(clock.minutes,times);
    const daylightProgress=Math.max(0,Math.min(1,(clock.minutes-times.sunrise)/(times.sunset-times.sunrise)));
    const solarHeight=Math.sin(Math.PI*daylightProgress);

    document.body.dataset.dayPhase=phase;
    document.body.style.setProperty("--solar-x",(10+80*daylightProgress).toFixed(2)+"%");
    document.body.style.setProperty("--solar-y",(62-47*solarHeight).toFixed(2)+"%");
    document.body.dataset.sunrise=Math.round(times.sunrise);
    document.body.dataset.sunset=Math.round(times.sunset);

    const themeMeta=document.querySelector('meta[name="theme-color"]');
    if(themeMeta)themeMeta.setAttribute("content",themeColors[phase]||themeColors.day);
  }

  updateAmbiance();
  setInterval(updateAmbiance,60000);
})();
</script>
