<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Détail alerte</title>
<meta name="theme-color" content="#287fbd">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<script src="assets/js/app-config.js?v=20260714-194000"></script>
<script src="assets/js/app-layout.js?v=20260716-7"></script>

<link rel="stylesheet" href="assets/css/app.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/themes/summer.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/themes/autumn.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/themes/christmas.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/themes/winter.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/themes/spring.css?v=20260714-194000">
<link rel="stylesheet" href="assets/css/pages/detail.css?v=20260714-194000">
</head>

<body class="app-page detail-page">

<div class="ambient-stage" aria-hidden="true"></div>

<div class="page" id="page">

<header class="plan-header">
<div id="backBtn" onclick="goBack()">
<img src="image/back.svg">
</div>
<h1>ALERTE</h1>
</header>

<div id="loader"><div class="spinner"></div></div>

<div id="content" style="display:none;">
<div class="card">
<div class="titre" id="titre"></div>
<div class="categorie" id="categorie"></div>
<div class="heure" id="heure"></div>
<div class="message" id="message"></div>
</div>
</div>

<dialog id="externalLinkDialog" class="external-link-dialog">
  <h2>Ouvrir un lien externe ?</h2>
  <p>Ce lien va ouvrir Safari et quitter temporairement la PWA.</p>
  <div class="external-link-actions">
    <button id="cancelExternalLink" type="button">Annuler</button>
    <button id="copyExternalLink" type="button">Copier</button>
    <button id="openExternalLink" type="button">Ouvrir</button>
  </div>
</dialog>

</div>

<script src="assets/js/notification-format.js?v=20260714-194000"></script>
<script>

/* Chargement du détail de l’alerte. */

const API_URL="https://ecurie-notifications-beta.damiensiri-pro.workers.dev/api/notifications";

const STORAGE_KEY="alerts_lues";

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

function parseDateFR(str){
  if(!str) return null;

  if(str.includes("T")){
    const d=new Date(str);
    d.setHours(0,0,0,0);
    return d;
  }

  if(str.includes("-")){
    const p=str.split("-");
    return new Date(p[0],p[1]-1,p[2],0,0,0);
  }

  if(str.includes("/")){
    const p=str.split("/");
    return new Date(p[2],p[1]-1,p[0],0,0,0);
  }

  return null;
}

function marquerLu(id){
  const lues=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");
  if(!lues.includes(id)){
    lues.push(id);
    localStorage.setItem(STORAGE_KEY,JSON.stringify(lues));
  }
}

async function loadDetail(){

  try{

    let cachedNotif=null;
    try{
      const cached=JSON.parse(sessionStorage.getItem("alert_detail_cache")||"null");
      if(cached&&String(cached.id)===String(id)) cachedNotif=cached;
    }catch(e){}

    let data=[];
    try{
      const res=await fetch(API_URL);
      data=await res.json();
    }catch(fetchError){
      if(cachedNotif) data=[cachedNotif];
      else throw fetchError;
    }

    const notif=data.find(n=>String(n.id)===String(id))||cachedNotif;

    if(!notif){
      document.getElementById("titre").innerText="Notification introuvable";
    }
    else{

      const today=new Date();
      today.setHours(0,0,0,0);

      const expireDate=parseDateFR(notif.expire);

      const autorisee =
        notif.active==="oui" &&
        (
          notif.epingle==="oui" ||
          !expireDate ||
          expireDate>=today
        );

      if(!autorisee){
        document.getElementById("titre").innerText=
          "Cette notification n’est plus disponible.";
      }
      else{

        marquerLu(notif.id);

        document.getElementById("titre").innerText=notif.titre;
        document.getElementById("categorie").innerText=notif.categorie||"";
        document.getElementById("heure").innerText=notif.heure||"";
        NotificationFormat.render(
          document.getElementById("message"),
          notif.message||"",
          openExternalLinkDialog
        );
      }
    }

  }catch(e){
    console.log("Erreur :",e);
  }

  document.getElementById("loader").style.display="none";
  document.getElementById("content").style.display="block";
}

function goBack(){
  window.history.back();
}

const externalLinkDialog=document.getElementById("externalLinkDialog");
let pendingExternalUrl="";

function openExternalLinkDialog(url){
  pendingExternalUrl=url;
  externalLinkDialog.showModal();
}

document.getElementById("cancelExternalLink").onclick=()=>externalLinkDialog.close();
document.getElementById("copyExternalLink").onclick=async()=>{
  try{
    await navigator.clipboard.writeText(pendingExternalUrl);
    document.getElementById("copyExternalLink").textContent="Copié";
    setTimeout(()=>{document.getElementById("copyExternalLink").textContent="Copier";},1200);
  }catch(e){}
};
document.getElementById("openExternalLink").onclick=()=>{
  externalLinkDialog.close();
  window.open(pendingExternalUrl,"_blank","noopener,noreferrer");
};

loadDetail();

</script>

</body>
</html>
